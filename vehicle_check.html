<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>แบบฟอร์มตรวจยานพาหนะ FM1-SOH3-S04-6103</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;}
body{font-family:'Sarabun',sans-serif;background:#f0f4f8;color:#1a2b3c;}
.topbar{background:#1a3c5e;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.t-title{font-size:15px;font-weight:700;}.t-sub{font-size:11px;opacity:.75;}
.spacer{flex:1;}
.btn{padding:10px 16px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:'Sarabun',sans-serif;}
.btn-sm{padding:8px 12px;font-size:13px;border-radius:7px;}
.btn-back{background:rgba(255,255,255,.15);color:#fff;}
.btn-save{background:#166534;color:#fff;}
.btn-print{background:#e84c0a;color:#fff;}
.btn-add{background:#1a3c5e;color:#fff;}
.btn-danger{background:#fee2e2;color:#991b1b;}
.container{max-width:900px;margin:0 auto;padding:16px;}
.card{background:#fff;border-radius:10px;border:1px solid #dde3ea;margin-bottom:16px;overflow:hidden;}
.card-hdr{background:#1a3c5e;color:#fff;padding:12px 16px;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.card-body{padding:16px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:14px;font-weight:700;color:#4b5563;}
.fg input,.fg select{padding:11px 12px;border:1.5px solid #c8d0da;border-radius:8px;font-size:15px;font-family:'Sarabun',sans-serif;width:100%;background:#fff;}
.veh-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:12px 16px;}
.veh-card{border:2px solid #dde3ea;border-radius:10px;padding:12px;cursor:pointer;text-align:center;transition:all .15s;background:#fff;}
.veh-card:hover{border-color:#1a3c5e;background:#f0f4f8;}
.veh-card.selected{border-color:#e84c0a;background:#fff3ee;}
.veh-plate{font-size:16px;font-weight:700;color:#1a3c5e;margin-bottom:3px;}
.veh-brand{font-size:12px;color:#6b7c8d;}
.veh-code{font-size:11px;color:#9ca3af;}
.month-nav{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#f8fafc;border-bottom:1px solid #dde3ea;}
.mnav-btn{width:40px;height:40px;border:1.5px solid #c8d0da;border-radius:8px;background:#fff;font-size:20px;cursor:pointer;}
.month-label{font-size:17px;font-weight:700;color:#1a3c5e;flex:1;text-align:center;}
.day-tabs{display:flex;overflow-x:auto;gap:6px;padding:12px 16px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{min-width:44px;height:44px;border-radius:8px;border:1.5px solid #c8d0da;background:#fff;font-size:14px;font-weight:600;cursor:pointer;flex-shrink:0;color:#374151;}
.day-tab.today{border-color:#e84c0a;color:#e84c0a;}
.day-tab.saved{background:#dcfce7;border-color:#86efac;color:#166534;}
.day-tab.has-fail{background:#fee2e2;border-color:#fca5a5;color:#dc2626;}
.day-tab.active{background:#1a3c5e!important;color:#fff!important;border-color:#1a3c5e!important;}
.ci{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid #edf0f3;}
.ci:last-child{border-bottom:none;}
.ci.stP{background:#f0fdf4;}.ci.stO{background:#fef2f2;}
.ci-no{min-width:34px;height:34px;background:#1a3c5e;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
.ci-name{flex:1;font-size:15px;font-weight:500;line-height:1.4;}
.cbtn-grp{display:flex;gap:8px;flex-shrink:0;}
.cbtn{width:46px;height:46px;border-radius:8px;border:1.5px solid #c8d0da;background:#fff;font-size:20px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.cbtn.aP{background:#166534;border-color:#166534;color:#fff;}
.cbtn.aO{background:#dc2626;border-color:#dc2626;color:#fff;}
.cbtn.aD{background:#6b7280;border-color:#6b7280;color:#fff;}
.signer-row{padding:12px 16px;background:#f8fafc;border-top:1px solid #dde3ea;}
.signer-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.signer-fg{display:flex;flex-direction:column;gap:5px;}
.signer-fg label{font-size:13px;font-weight:700;color:#4b5563;}
.signer-fg input{padding:9px 12px;border:1.5px solid #c8d0da;border-radius:8px;font-size:14px;font-family:'Sarabun',sans-serif;width:100%;}
.summary-bar{display:flex;gap:14px;padding:10px 16px;background:#f0f4f8;border-top:1px solid #dde3ea;flex-wrap:wrap;}
.sum-item{display:flex;align-items:center;gap:6px;font-size:14px;}
.badge{display:inline-block;padding:4px 11px;border-radius:20px;font-size:13px;font-weight:700;}
.badge-ok{background:#dcfce7;color:#166534;}.badge-fail{background:#fee2e2;color:#dc2626;}.badge-skip{background:#f3f4f6;color:#6b7280;}
.defect-item{display:grid;grid-template-columns:1fr 160px 46px;gap:8px;align-items:center;padding:10px 16px;border-bottom:1px solid #edf0f3;}
.defect-item input{padding:10px 12px;border:1.5px solid #c8d0da;border-radius:8px;font-size:14px;font-family:'Sarabun',sans-serif;width:100%;}
.btn-del{width:46px;height:46px;border:none;background:#fee2e2;color:#dc2626;border-radius:8px;cursor:pointer;font-size:18px;}
/* Modal */
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;}
.modal-bg.show{display:flex;}
.modal{background:#fff;border-radius:12px;padding:24px;width:90%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:700;color:#1a3c5e;margin-bottom:16px;}
/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:13px 22px;border-radius:10px;font-size:15px;z-index:99999;display:none;color:#fff;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,.25);}
.toast.show{display:block;}.t-ok{background:#166534;}.t-err{background:#dc2626;}.t-info{background:#1a3c5e;}
@media(max-width:640px){
  html{font-size:17px;}.form-row,.signer-grid{grid-template-columns:1fr;}
  .defect-item{grid-template-columns:1fr 46px;gap:6px;}.defect-item input[type=date]{grid-column:1/-1;}
  .veh-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));}
}
@media print{
  *{font-family:'Sarabun',sans-serif!important;}
  body,html{background:#fff!important;margin:0;padding:0;}
  .no-print,.topbar,.container{display:none!important;}
  @page{size:A4 landscape;margin:5mm;}
  .print-page{display:block!important;}
}
.print-page{display:none;}
</style>
</head>
<body>
<div class="topbar">
  <div><div class="t-title">&#128663; แบบฟอร์มตรวจยานพาหนะก่อนปฏิบัติงาน</div><div class="t-sub">FM1-SOH3-S04-6103 | กฟต.2</div></div>
  <div class="spacer"></div>
  <button class="btn btn-back no-print" onclick="goHome()">&#8592; หลัก</button>
  <button class="btn btn-save no-print" id="btnSave" onclick="saveData()">&#128190; บันทึก</button>
  <button class="btn btn-print no-print" onclick="doPrint()">&#128438; พิมพ์รายงานเดือน</button>
</div>

<div class="container no-print">

  <!-- เลือกรถ -->
  <div class="card">
    <div class="card-hdr">
      <span>&#128663; เลือกรถที่ต้องการตรวจ</span>
      <button class="btn btn-sm" onclick="openAddVehicle()" style="background:rgba(255,255,255,.2);color:#fff;">+ เพิ่มรถ</button>
    </div>
    <div class="veh-grid" id="vehGrid">
      <div style="padding:20px;text-align:center;color:#9ca3af;grid-column:1/-1;">กำลังโหลด...</div>
    </div>
  </div>

  <!-- รายการตรวจสอบ -->
  <div class="card" id="checkCard" style="display:none;">
    <div class="card-hdr">
      <span id="checkHdr">&#9989; รายการตรวจสอบ</span>
      <div style="display:flex;gap:6px;">
        <button onclick="checkAll('P')" style="background:#166634;color:#fff;border:none;padding:8px 12px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;">&#10003; ผ่านทั้งหมด</button>
        <button onclick="checkAll('')" style="background:rgba(255,255,255,.18);color:#fff;border:none;padding:8px 12px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;">&#10006; ล้าง</button>
      </div>
    </div>
    <div class="month-nav">
      <button class="mnav-btn" onclick="changeMonth(-1)">&#8592;</button>
      <div class="month-label" id="monthLabel">-</div>
      <button class="mnav-btn" onclick="changeMonth(1)">&#8594;</button>
    </div>
    <div class="day-tabs" id="dayTabs"></div>
    <div id="checkList"></div>
    <div class="signer-row">
      <div class="signer-grid">
        <div class="signer-fg">
          <label>&#128394; ผู้นำรถไปใช้งาน / ผู้ตรวจสอบ</label>
          <input id="fSigner" type="text" placeholder="ชื่อ-นามสกุล">
        </div>
        <div class="signer-fg">
          <label>&#128394; ผู้ควบคุมยานพาหนะ</label>
          <div style="display:flex;gap:8px;">
            <input id="fSuper" type="text" placeholder="ชื่อ-นามสกุล" style="flex:1;">
            <input id="fSuperPos" type="text" placeholder="ตำแหน่ง" style="flex:1;">
          </div>
        </div>
      </div>
    </div>
    <div class="summary-bar">
      <div class="sum-item">&#10003; ผ่าน: <span class="badge badge-ok" id="cntP">0</span></div>
      <div class="sum-item">&#10007; ไม่ผ่าน: <span class="badge badge-fail" id="cntO">0</span></div>
      <div class="sum-item">- ไม่เกี่ยวข้อง: <span class="badge badge-skip" id="cntD">0</span></div>
      <div class="sum-item">ยังไม่ตรวจ: <span class="badge badge-skip" id="cntN">19</span></div>
    </div>
  </div>

  <!-- ข้อบกพร่อง -->
  <div class="card" id="defectCard" style="display:none;">
    <div class="card-hdr">
      <span>&#9888;&#65039; ข้อบกพร่องที่พบ</span>
      <button onclick="addDefect()" style="background:rgba(255,255,255,.18);color:#fff;border:none;padding:8px 12px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;">+ เพิ่ม</button>
    </div>
    <div id="defectArea"><div id="noDefect" style="padding:16px;text-align:center;color:#9ca3af;font-size:14px;">ไม่พบข้อบกพร่อง</div></div>
  </div>

</div>

<!-- Add/Edit Vehicle Modal -->
<div class="modal-bg" id="vehModal">
  <div class="modal">
    <div class="modal-title" id="vehModalTitle">เพิ่มรถใหม่</div>
    <input type="hidden" id="vehId">
    <div class="form-row" style="margin-bottom:12px;">
      <div class="fg"><label>เลขทะเบียน *</label><input id="vPlate" type="text" placeholder="กข 1234 กรุงเทพ"></div>
      <div class="fg"><label>รหัสรถ</label><input id="vCode" type="text" placeholder="รหัส..."></div>
    </div>
    <div class="form-row" style="margin-bottom:12px;">
      <div class="fg"><label>ยี่ห้อ/รุ่น</label><input id="vBrand" type="text" placeholder="Toyota Hilux Revo..."></div>
      <div class="fg"><label>ผู้รับผิดชอบ</label><input id="vResp" type="text" placeholder="ชื่อผู้รับผิดชอบ..."></div>
    </div>
    <div class="fg" style="margin-bottom:16px;"><label>หน่วยงาน</label><input id="vUnit" type="text" placeholder="กฟฟ. / สาขา..."></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="btn btn-sm" onclick="closeVehModal()" style="background:#f0f4f8;color:#1a3c5e;border:1px solid #c8d0da;">ยกเลิก</button>
      <button class="btn btn-sm btn-save" onclick="saveVehicle()">&#128190; บันทึก</button>
    </div>
  </div>
</div>

<div class="print-page" id="printPage"></div>

  <button onclick="window.scrollTo({top:0,behavior:'smooth'})" id="btnTop" style="width:46px;height:46px;border-radius:50%;background:#1a3c5e;color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3);display:none;">&#8679;</button>
  <button onclick="window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'})" style="width:46px;height:46px;border-radius:50%;background:#e84c0a;color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3);">&#8681;</button>

<div class="toast" id="toast"></div>

<script>
var EXEC_URL='';
google.script.run.withSuccessHandler(function(u){EXEC_URL=u;}).getScriptUrl();
function goHome(){google.script.run.withSuccessHandler(function(u){window.top.location.href=u+'?page=index';}).getScriptUrl();}
window.addEventListener('scroll',function(){document.getElementById('btnTop').style.display=window.scrollY<200?'none':'block';});
var ITEMS=["เข็มขัดนิรภัย","ไฟส่องสว่าง (สูง-ต่ำ) หน้า-หลัง","ไฟเบรก","ไฟสัญญาณ (ไฟวับวาบ, เลี้ยวซ้าย-ขวา, ถอยหลัง)","กระจกหน้ารถ","กระจกมองข้าง/หลัง","ที่ปัดน้ำฝน","น้ำฉีดกระจก","ระดับน้ำมันเชื้อเพลิง","ระดับน้ำมันหล่อลื่นเครื่องยนต์","การทำงานของแตร","ระบบเบรก (เบรกมือ/เบรกเท้า)","เครื่องปรับอากาศ","สภาพยาง กระทะล้อ และน๊อตยึดล้อ","อุปกรณ์ดับเพลิง","แบตเตอรี่ (ขั้ว, น้ำกลั่น)","ทำความสะอาดด้านในและด้านนอก","ความเสียหายภายใน","ความเสียหายภายนอก"];
var THAI_MONTHS=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
var vehicles=[];
var selVehicle=null;
var monthData={};  // monthData[day]={results:{},signer:'',supervisor:'',supervisorPos:'',defects:[]}
var curYear,curMonth,curDay;

function daysInMonth(y,m){return new Date(y,m,0).getDate();}

/* ===== VEHICLES ===== */
function loadVehicles(){
  google.script.run.withSuccessHandler(function(list){
    vehicles=list||[];
    renderVehGrid();
    // restore selection
    if(selVehicle){
      var found=vehicles.find(function(v){return v.vehicle_id===selVehicle.vehicle_id;});
      if(found) selectVehicle(found);
    }
  }).getVehicles();
}

function renderVehGrid(){
  var el=document.getElementById('vehGrid');
  if(!vehicles.length){
    el.innerHTML='<div style="padding:20px;text-align:center;color:#9ca3af;grid-column:1/-1;font-size:14px;">ยังไม่มีรถ กดปุ่ม "+ เพิ่มรถ" เพื่อเริ่มต้น</div>';
    return;
  }
  el.innerHTML=vehicles.map(function(v){
    var sel=selVehicle&&selVehicle.vehicle_id===v.vehicle_id;
    return '<div class="veh-card'+(sel?' selected':'')+'" onclick="selectVehicle('+JSON.stringify(v).replace(/"/g,'&quot;')+')">'
      +'<div class="veh-plate">'+v.plate+'</div>'
      +'<div class="veh-brand">'+v.brand+'</div>'
      +'<div class="veh-code">'+(v.code||'')+'</div>'
      +'<div style="margin-top:6px;display:flex;gap:4px;justify-content:center;">'
      +'<button onclick="event.stopPropagation();editVehicle(\''+v.vehicle_id+'\')" style="border:none;background:#e8f0fe;color:#1a3c5e;border-radius:5px;padding:3px 8px;font-size:11px;cursor:pointer;">&#9998;</button>'
      +'<button onclick="event.stopPropagation();confirmDeleteVehicle(\''+v.vehicle_id+'\',\''+v.plate+'\')" style="border:none;background:#fee2e2;color:#dc2626;border-radius:5px;padding:3px 8px;font-size:11px;cursor:pointer;">&#128465;</button>'
      +'</div></div>';
  }).join('');
}

function selectVehicle(v){
  selVehicle=v;
  renderVehGrid();
  document.getElementById('checkCard').style.display='block';
  document.getElementById('defectCard').style.display='block';
  // Load monthly data from server
  loadMonthlyData();
}

function openAddVehicle(){
  document.getElementById('vehId').value='';
  document.getElementById('vehModalTitle').textContent='เพิ่มรถใหม่';
  ['vPlate','vCode','vBrand','vResp','vUnit'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('vehModal').classList.add('show');
}

function editVehicle(id){
  var v=vehicles.find(function(x){return x.vehicle_id===id;});
  if(!v)return;
  document.getElementById('vehId').value=v.vehicle_id;
  document.getElementById('vehModalTitle').textContent='แก้ไขข้อมูลรถ';
  document.getElementById('vPlate').value=v.plate||'';
  document.getElementById('vCode').value=v.code||'';
  document.getElementById('vBrand').value=v.brand||'';
  document.getElementById('vResp').value=v.responsible||'';
  document.getElementById('vUnit').value=v.unit||'';
  document.getElementById('vehModal').classList.add('show');
}

function closeVehModal(){document.getElementById('vehModal').classList.remove('show');}

function saveVehicle(){
  var plate=document.getElementById('vPlate').value.trim();
  if(!plate){showToast('กรุณาใส่เลขทะเบียน','err');return;}
  var payload={
    vehicle_id:document.getElementById('vehId').value||'',
    plate:plate,
    code:document.getElementById('vCode').value,
    brand:document.getElementById('vBrand').value,
    responsible:document.getElementById('vResp').value,
    unit:document.getElementById('vUnit').value
  };
  google.script.run.withSuccessHandler(function(res){
    if(res.success){closeVehModal();loadVehicles();showToast('บันทึกข้อมูลรถสำเร็จ','ok');}
    else showToast('เกิดข้อผิดพลาด: '+(res.error||''),'err');
  }).saveVehicle(payload);
}

function confirmDeleteVehicle(id,plate){
  if(!confirm('ลบรถ "'+plate+'" ออกจากรายการ?'))return;
  google.script.run.withSuccessHandler(function(res){
    if(res.success){
      if(selVehicle&&selVehicle.vehicle_id===id){
        selVehicle=null;
        document.getElementById('checkCard').style.display='none';
        document.getElementById('defectCard').style.display='none';
      }
      loadVehicles();showToast('ลบรถสำเร็จ','ok');
    }
  }).deleteVehicle(id);
}

/* ===== MONTHLY DATA ===== */
function loadMonthlyData(){
  if(!selVehicle)return;
  document.getElementById('checkHdr').textContent='\u2705 รถ '+selVehicle.plate+' — กำลังโหลด...';
  google.script.run.withSuccessHandler(function(list){
    monthData={};
    (list||[]).forEach(function(r){
      var d=parseInt(r.check_date.split('-')[2]);
      var res={};
      try{res=JSON.parse(r.results_json||'{}');}catch(e){}
      var defs=[];
      try{defs=JSON.parse(r.defects_json||'[]');}catch(e){}
      monthData[d]={results:res,signer:r.signer,supervisor:r.supervisor,supervisorPos:r.supervisor_pos,defects:defs,saved:true};
    });
    updateLabel();buildDayTabs();buildCheckList();
  }).getVehicleMonthlyData(selVehicle.vehicle_id, curYear, curMonth);
}

/* ===== CALENDAR ===== */
function init(){
  var now=new Date();
  curYear=now.getFullYear();curMonth=now.getMonth()+1;curDay=now.getDate();
}

function updateLabel(){
  document.getElementById('monthLabel').textContent=THAI_MONTHS[curMonth-1]+' '+(curYear+543);
  document.getElementById('checkHdr').textContent='\u2705 รถ '+(selVehicle?selVehicle.plate:'')+' — วันที่ '+curDay+' '+THAI_MONTHS[curMonth-1]+' '+(curYear+543);
}

function changeMonth(d){
  flushDay();curMonth+=d;
  if(curMonth>12){curMonth=1;curYear++;}
  if(curMonth<1){curMonth=12;curYear--;}
  monthData={};
  curDay=1;
  loadMonthlyData();
}

function buildDayTabs(){
  var total=daysInMonth(curYear,curMonth);
  var now=new Date();
  var isNow=(now.getFullYear()===curYear&&now.getMonth()+1===curMonth);
  var td=now.getDate();var html='';
  for(var d=1;d<=total;d++){
    var dat=monthData[d];
    var hasFail=dat&&Object.keys(dat.results||{}).some(function(k){return dat.results[k]==='O';});
    var hasData=dat&&dat.saved;
    var cls='day-tab';
    if(d===curDay)cls+=' active';
    else if(isNow&&d===td)cls+=' today';
    else if(hasFail)cls+=' has-fail';
    else if(hasData)cls+=' saved';
    html+='<button class="'+cls+'" id="dt'+d+'" onclick="selDay('+d+')">'+d+'</button>';
  }
  document.getElementById('dayTabs').innerHTML=html;
  setTimeout(function(){var b=document.getElementById('dt'+curDay);if(b)b.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});},80);
}

function selDay(d){flushDay();curDay=d;updateLabel();buildDayTabs();buildCheckList();}

function flushDay(){
  if(!monthData[curDay])monthData[curDay]={results:{},signer:'',supervisor:'',supervisorPos:'',defects:[],saved:false};
  for(var i=1;i<=ITEMS.length;i++){var ci=document.getElementById('ci'+i);if(ci)monthData[curDay].results[i]=ci.getAttribute('data-v')||'';}
  monthData[curDay].signer=(document.getElementById('fSigner')||{}).value||'';
  monthData[curDay].supervisor=(document.getElementById('fSuper')||{}).value||'';
  monthData[curDay].supervisorPos=(document.getElementById('fSuperPos')||{}).value||'';
  // defects
  var defs=[];
  document.querySelectorAll('.defect-item').forEach(function(d){
    var inp=d.querySelectorAll('input');
    defs.push({text:inp[0].value,date:inp[1].value});
  });
  monthData[curDay].defects=defs;
}

function buildCheckList(){
  var dat=monthData[curDay]||{results:{},signer:'',supervisor:'',supervisorPos:'',defects:[]};
  var html='';
  for(var i=0;i<ITEMS.length;i++){
    var no=i+1;var st=dat.results[no]||'';
    var rc='ci'+(st==='P'?' stP':st==='O'?' stO':'');
    html+='<div class="'+rc+'" id="ci'+no+'" data-v="'+st+'">'
      +'<div class="ci-no">'+no+'</div>'
      +'<div class="ci-name">'+ITEMS[i]+'</div>'
      +'<div class="cbtn-grp">'
      +'<button class="cbtn'+(st==='P'?' aP':'')+'" data-no="'+no+'" data-val="P" onclick="doCheck(this)">&#10003;</button>'
      +'<button class="cbtn'+(st==='O'?' aO':'')+'" data-no="'+no+'" data-val="O" onclick="doCheck(this)">&#10007;</button>'
      +'<button class="cbtn'+(st==='-'?' aD':'')+'" data-no="'+no+'" data-val="-" onclick="doCheck(this)">&#9135;</button>'
      +'</div></div>';
  }
  document.getElementById('checkList').innerHTML=html;
  document.getElementById('fSigner').value=dat.signer||'';
  document.getElementById('fSuper').value=dat.supervisor||'';
  document.getElementById('fSuperPos').value=dat.supervisorPos||'';
  // rebuild defects
  var da=document.getElementById('defectArea');
  defCount=0;
  da.innerHTML='<div id="noDefect" style="padding:16px;text-align:center;color:#9ca3af;font-size:14px;">ไม่พบข้อบกพร่อง</div>';
  (dat.defects||[]).forEach(function(dx){
    defCount++;
    document.getElementById('noDefect').style.display='none';
    var dc=document.createElement('div');
    dc.className='defect-item';dc.id='def'+defCount;
    dc.innerHTML='<input type="text" value="'+dx.text+'" placeholder="\u0e23\u0e30\u0e1a\u0e38\u0e02\u0e49\u0e2d\u0e1a\u0e01\u0e1e\u0e23\u0e48\u0e2d\u0e07...">'
      +'<input type="date" value="'+dx.date+'">'
      +'<button class="btn-del" onclick="rmDef('+defCount+')">&#128465;</button>';
    da.appendChild(dc);
  });
  updateSummary();
}

function doCheck(btn){setCheck(parseInt(btn.dataset.no),btn.dataset.val);}
function setCheck(no,val){
  var ci=document.getElementById('ci'+no);if(!ci)return;
  var cur=ci.getAttribute('data-v');var nv=(cur===val)?'':val;
  ci.setAttribute('data-v',nv);ci.className='ci'+(nv==='P'?' stP':nv==='O'?' stO':'');
  var btns=ci.querySelectorAll('.cbtn');
  if(btns[0])btns[0].className='cbtn'+(nv==='P'?' aP':'');
  if(btns[1])btns[1].className='cbtn'+(nv==='O'?' aO':'');
  if(btns[2])btns[2].className='cbtn'+(nv==='-'?' aD':'');
  updateSummary();
}
function checkAll(val){for(var i=1;i<=ITEMS.length;i++)setCheck(i,val);}
function updateSummary(){
  var p=0,o=0,d=0,n=0;
  for(var i=1;i<=ITEMS.length;i++){var ci=document.getElementById('ci'+i);var st=ci?ci.getAttribute('data-v'):'';if(st==='P')p++;else if(st==='O')o++;else if(st==='-')d++;else n++;}
  document.getElementById('cntP').textContent=p;document.getElementById('cntO').textContent=o;
  document.getElementById('cntD').textContent=d;document.getElementById('cntN').textContent=n;
}

var defCount=0;
function addDefect(){
  document.getElementById('noDefect').style.display='none';defCount++;
  var dc=document.createElement('div');dc.className='defect-item';dc.id='def'+defCount;
  dc.innerHTML='<input type="text" placeholder="\u0e23\u0e30\u0e1a\u0e38\u0e02\u0e49\u0e2d\u0e1a\u0e01\u0e1e\u0e23\u0e48\u0e2d\u0e07..."><input type="date"><button class="btn-del" onclick="rmDef('+defCount+')">&#128465;</button>';
  document.getElementById('defectArea').appendChild(dc);
}
function rmDef(id){
  var el=document.getElementById('def'+id);if(el)el.remove();
  if(!document.querySelector('.defect-item'))document.getElementById('noDefect').style.display='block';
}

/* ===== SAVE ===== */
function saveData(){
  if(!selVehicle){showToast('กรุณาเลือกรถก่อน','err');return;}
  flushDay();
  var dat=monthData[curDay]||{};
  // Build check_date as YYYY-MM-DD
  var mm=String(curMonth).padStart(2,'0');
  var dd2=String(curDay).padStart(2,'0');
  var checkDate=curYear+'-'+mm+'-'+dd2;
  var payload={
    vehicle_id    : selVehicle.vehicle_id,
    check_date    : checkDate,
    signer        : dat.signer||'',
    supervisor    : dat.supervisor||'',
    supervisor_pos: dat.supervisorPos||'',
    results_json  : JSON.stringify(dat.results||{}),
    defects_json  : JSON.stringify(dat.defects||[])
  };
  document.getElementById('btnSave').disabled=true;
  document.getElementById('btnSave').textContent='กำลังบันทึก...';
  google.script.run.withSuccessHandler(function(res){
    document.getElementById('btnSave').disabled=false;
    document.getElementById('btnSave').innerHTML='\uD83D\uDCBE บันทึก';
    if(res.success){
      if(!monthData[curDay])monthData[curDay]={};
      monthData[curDay].saved=true;
      buildDayTabs();
      showToast('\u2714 บันทึกวันที่ '+curDay+' '+THAI_MONTHS[curMonth-1]+' สำเร็จ','ok');
    } else {
      showToast('บันทึกล้มเหลว: '+(res.error||''),'err');
    }
  }).withFailureHandler(function(e){
    document.getElementById('btnSave').disabled=false;
    document.getElementById('btnSave').innerHTML='\uD83D\uDCBE บันทึก';
    showToast('เกิดข้อผิดพลาด: '+e.message,'err');
  }).saveVehicleCheck(payload);
}

/* ===== PRINT ===== */
function thDate(d){if(!d)return'';var p=d.split('-');return parseInt(p[2])+' '+THAI_MONTHS[parseInt(p[1])-1]+' '+(parseInt(p[0])+543);}

function doPrint(){
  if(!selVehicle){showToast('กรุณาเลือกรถก่อน','err');return;}
  flushDay();buildPrint();window.print();
}

function buildPrint(){
  var total=daysInMonth(curYear,curMonth);
  var v=selVehicle||{};
  // Use supervisor from any day that has data (or last day)
  var anyDat=monthData[curDay]||{supervisor:'',supervisorPos:''};
  var sup=anyDat.supervisor||'';
  var supPos=anyDat.supervisorPos||'';

  var allDefs=[];
  for(var d=1;d<=total;d++){
    var dat2=monthData[d];

  h+='</tr></table>';

  h+='<div style="font-size:8.5pt;margin-bottom:1mm;">';

  h+='เลขทะเบียน: <span style="'+UL+'20mm;">'+(v.plate||'')+'</span>&ensp;';
  h+='รหัส <span style="'+UL+'14mm;">'+(v.code||'')+'</span>&ensp;';
  h+='ยี่ห้อรถ/รุ่น: <span style="'+UL+'18mm;">'+(v.brand||'')+'</span>&ensp;';
  h+='ต้น&ensp;เดือน <span style="'+UL+'10mm;">'+THAI_MONTHS[curMonth-1]+'</span>&ensp;';
  h+='พ.ศ. <span style="'+UL+'10mm;">'+(curYear+543)+'</span></div>';
  h+='<div style="font-size:7.5pt;text-align:center;margin-bottom:1mm;">ใช้เครื่องหมายถูก (&#10003;) สำหรับทุกรายการที่อยู่ในสภาพดี&emsp;ใช้เครื่องหมายผิด (&#10007;) สำหรับรายการที่ต้องการซ่อมแซม&emsp;ใช้เครื่องหมาย (-) ในช่องที่ไม่เกี่ยวข้อง</div>';
  h+='<table style="width:100%;border-collapse:collapse;table-layout:fixed;font-size:7.5pt;">';
  h+='<colgroup><col style="width:3%"><col style="width:25%">';

  h+='<col style="width:7%"></colgroup><thead>';
  h+='<tr style="background:#b8ccdc;-webkit-print-color-adjust:exact;print-color-adjust:exact;"><th colspan="'+(3+total)+'" style="'+B+'padding:2px;'+CC+'font-size:8.5pt;font-weight:700;">การตรวจสอบยานพาหนะ</th></tr>';
  h+='<tr style="background:#ccdde8;-webkit-print-color-adjust:exact;print-color-adjust:exact;">';

  h+='<th rowspan="2" style="'+B+'padding:1.5px 3px;'+CC+'">รายการ</th>';

  h+='</table></td>';
  h+='<td style="vertical-align:top;padding-left:5mm;width:35%;font-size:9pt;">';

  h+='<div style="text-align:center;margin:3mm 0 0.5mm;"><span style="border-bottom:0.5px solid #000;display:inline-block;min-width:55mm;padding-bottom:0.5mm;">'+sup+'</span></div>';

  h+='</td></tr></table>';
  h+='<div style="margin-top:1.5mm;font-size:6.5pt;display:flex;justify-content:space-between;color:#555;"><span>FM1-SOH3-S04-6103 ประกาศใช้ครั้งแรกเมื่อ 30/05/2561</span><span>ปรับปรุงครั้งที่ 00 วันที่ -/-/-</span></div></div>';

function showToast(msg,type){var t=document.getElementById('toast');t.innerHTML=msg;t.className='toast show t-'+(type||'info');setTimeout(function(){t.className='toast';},3000);}
