<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>ตรวจยานพาหนะ</title>
<style>
/* RESET */
*{box-sizing:border-box;margin:0;padding:0;}

/* BASE — mobile size, no queries needed */
html,body{font-size:18px;font-family:'Sarabun',sans-serif;background:#f0f4f8;color:#1a2b3c;}

/* Desktop: cap font size and container width */
@media(min-width:768px){
  html,body{font-size:14px;}
  .tb{padding:10px 20px;}
  .card{margin:10px 0;}
  .vgrid{grid-template-columns:repeat(4,1fr);}
  .cb{width:42px;height:42px;font-size:18px;}
  .cino{min-width:32px;height:32px;font-size:13px;}
  .ciname{font-size:14px;}
  .ci{padding:10px 16px;}
  .dtab{min-width:40px;height:40px;font-size:13px;}
  .mbtn{width:40px;height:40px;font-size:18px;}
  .mlabel{font-size:16px;}
  .sginp{font-size:14px;padding:8px 10px;}
  .sgrow label{font-size:13px;}
  .definp{font-size:14px;padding:8px 10px;}
  .delbtn{height:40px;font-size:14px;}
  .tbtn{font-size:13px;padding:8px 12px;}
}

/* TOPBAR */
.tb{background:#1a3c5e;color:#fff;padding:12px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.tb-title{font-size:17px;font-weight:700;flex:1;line-height:1.3;}
.tb-sub{font-size:12px;opacity:.75;}
.tbtn{padding:10px 14px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:inherit;min-height:44px;}
.tbtn-back{background:rgba(255,255,255,.18);color:#fff;}
.tbtn-save{background:#166534;color:#fff;}
.tbtn-print{background:#e84c0a;color:#fff;}

/* CARD */
.card{background:#fff;border-radius:12px;border:1px solid #dde3ea;margin:10px 12px;overflow:hidden;}
.chdr{background:#1a3c5e;color:#fff;padding:13px 14px;font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.card-body{padding:14px;}
.hbtn{border:none;padding:9px 14px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;min-height:42px;}

/* VEHICLE GRID */
.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px;}
.vcard{border:2.5px solid #dde3ea;border-radius:12px;padding:14px 10px;cursor:pointer;text-align:center;background:#fff;}
.vcard.sel{border-color:#e84c0a;background:#fff3ee;}
.vplate{font-size:19px;font-weight:700;color:#1a3c5e;margin-bottom:3px;}
.vbrand{font-size:14px;color:#6b7c8d;}
.vcode{font-size:12px;color:#9ca3af;margin-bottom:8px;}
.vbtns{display:flex;gap:6px;justify-content:center;}
.vibtn{border:none;border-radius:7px;padding:7px 12px;font-size:14px;cursor:pointer;min-height:36px;}

/* MONTH NAV */
.mnav{display:flex;align-items:center;gap:10px;padding:13px 14px;background:#f8fafc;border-bottom:1px solid #dde3ea;}
.mbtn{width:50px;height:50px;border:1.5px solid #c8d0da;border-radius:10px;background:#fff;font-size:22px;cursor:pointer;}
.mlabel{font-size:20px;font-weight:700;color:#1a3c5e;flex:1;text-align:center;}

/* DAY TABS */
.dtabs{display:flex;overflow-x:auto;gap:8px;padding:12px 14px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.dtabs::-webkit-scrollbar{display:none;}
.dtab{min-width:52px;height:52px;border-radius:10px;border:2px solid #c8d0da;background:#fff;font-size:16px;font-weight:700;cursor:pointer;flex-shrink:0;color:#374151;display:flex;align-items:center;justify-content:center;}
.dtab.today{border-color:#e84c0a;color:#e84c0a;}
.dtab.saved{background:#dcfce7;border-color:#86efac;color:#166534;}
.dtab.fail{background:#fee2e2;border-color:#fca5a5;color:#dc2626;}
.dtab.act{background:#1a3c5e!important;color:#fff!important;border-color:#1a3c5e!important;}

/* CHECK ITEMS */
.ci{display:flex;align-items:center;gap:12px;padding:15px 14px;border-bottom:1px solid #edf0f3;}
.ci:last-child{border-bottom:none;}
.ci.stP{background:#f0fdf4;}
.ci.stO{background:#fef2f2;}
.cino{min-width:42px;height:42px;background:#1a3c5e;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;}
.ciname{flex:1;font-size:17px;font-weight:500;line-height:1.4;}
.cbgrp{display:flex;gap:10px;flex-shrink:0;}
.cb{width:58px;height:58px;border-radius:10px;border:2px solid #c8d0da;background:#fff;font-size:22px;cursor:pointer;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;}
.cb.aP{background:#166534;border-color:#166534;color:#fff;}
.cb.aO{background:#dc2626;border-color:#dc2626;color:#fff;}
.cb.aD{background:#6b7280;border-color:#6b7280;color:#fff;}

/* SIGNER */
.sgrow{padding:14px;background:#f8fafc;border-top:1px solid #dde3ea;}
.sgrow label{font-size:15px;font-weight:700;color:#4b5563;display:block;margin-bottom:6px;margin-top:10px;}
.sgrow label:first-child{margin-top:0;}
.sginp{padding:12px;border:1.5px solid #c8d0da;border-radius:8px;font-size:17px;font-family:inherit;width:100%;}

/* SUMMARY */
.sumbar{display:flex;gap:10px;padding:12px 14px;background:#f0f4f8;border-top:1px solid #dde3ea;flex-wrap:wrap;}
.si{display:flex;align-items:center;gap:6px;font-size:16px;}
.bdg{display:inline-block;padding:4px 12px;border-radius:20px;font-size:15px;font-weight:700;}
.bok{background:#dcfce7;color:#166534;}
.bfail{background:#fee2e2;color:#dc2626;}
.bskip{background:#f3f4f6;color:#6b7280;}

/* DEFECT */
.defrow{padding:12px 14px;border-bottom:1px solid #edf0f3;display:flex;flex-direction:column;gap:8px;}
.definp{padding:12px;border:1.5px solid #c8d0da;border-radius:8px;font-size:17px;font-family:inherit;width:100%;}
.delbtn{width:100%;height:48px;border:none;background:#fee2e2;color:#dc2626;border-radius:8px;cursor:pointer;font-size:17px;font-weight:700;}

/* FORM */
.frow{margin-bottom:14px;}
.flabel{font-size:16px;font-weight:700;color:#4b5563;display:block;margin-bottom:6px;}
.finp{padding:13px 12px;border:1.5px solid #c8d0da;border-radius:8px;font-size:17px;font-family:inherit;width:100%;background:#fff;}

/* MODAL */
.mbg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:9999;align-items:flex-end;justify-content:center;}
.mbg.show{display:flex;}
.mbox{background:#fff;border-radius:16px 16px 0 0;padding:22px;width:100%;max-height:90vh;overflow-y:auto;}
.mtitle{font-size:20px;font-weight:700;color:#1a3c5e;margin-bottom:16px;}
.mbtns{display:flex;gap:10px;margin-top:16px;}
.mbtn-cancel{flex:1;background:#f0f4f8;color:#1a3c5e;border:1.5px solid #c8d0da;padding:13px;border-radius:8px;font-size:17px;font-weight:700;cursor:pointer;}
.mbtn-ok{flex:1;background:#166534;color:#fff;padding:13px;border-radius:8px;font-size:17px;font-weight:700;cursor:pointer;border:none;}

/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:14px 22px;border-radius:10px;font-size:17px;z-index:99999;display:none;color:#fff;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,.25);white-space:nowrap;}
.toast.show{display:block;}
.tok{background:#166534;}.terr{background:#dc2626;}.tinfo{background:#1a3c5e;}

/* SCROLL */
.scbtn{position:fixed;right:14px;bottom:20px;width:52px;height:52px;border-radius:50%;border:none;font-size:22px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3);z-index:100;}

/* PRINT */
@media print{
  body,html{background:#fff!important;}
  .tb,.card,.mbg,.toast,.scbtn,.no-print{display:none!important;}
  @page{size:A4 landscape;margin:5mm;}
  .ppage{display:block!important;}
}
.ppage{display:none;}
</style>
</head>

<script>
/* Force mobile viewport - fixes GAS iframe issue */
(function(){
  // Remove any existing viewport meta
  var metas = document.getElementsByTagName('meta');
  for(var i=metas.length-1;i>=0;i--){
    if(metas[i].getAttribute('name')==='viewport') metas[i].parentNode.removeChild(metas[i]);
  }
  // Add correct viewport
  var m=document.createElement('meta');
  m.name='viewport';
  m.content='width=device-width,initial-scale=1.0,maximum-scale=5.0';
  document.getElementsByTagName('head')[0].appendChild(m);
})();
</script>

<div class="tb">
  <div>
    <div class="tb-title">&#128663; ตรวจยานพาหนะ</div>
    <div class="tb-sub">FM1-SOH3-S04-6103</div>
  </div>
  <button class="tbtn tbtn-back" onclick="goHome()">&#8592; หลัก</button>
  <button class="tbtn tbtn-save" id="btnSave" onclick="saveData()">&#128190; บันทึก</button>
  <button class="tbtn tbtn-print" onclick="doPrint()">&#128438; พิมพ์</button>
</div>

<div style="max-width:900px;margin:0 auto;">
<div class="card">
  <div class="chdr">
    <span>&#128663; เลือกรถที่ต้องการตรวจ</span>
    <button class="hbtn" onclick="openAddVeh()" style="background:rgba(255,255,255,.2);color:#fff;">+ เพิ่มรถ</button>
  </div>
  <div class="vgrid" id="vehGrid">
    <div style="padding:20px;text-align:center;color:#9ca3af;grid-column:1/-1;font-size:17px;">&#9203; กำลังโหลด...</div>
  </div>
</div>

<div class="card" id="checkCard" style="display:none;">
  <div class="chdr">
    <span id="checkHdr" style="font-size:16px;">&#9989; รายการตรวจ</span>
    <div style="display:flex;gap:8px;">
      <button class="hbtn" onclick="checkAll('P')" style="background:#166534;color:#fff;">&#10003; ผ่านหมด</button>
      <button class="hbtn" onclick="checkAll('')" style="background:rgba(255,255,255,.18);color:#fff;">&#10006;</button>
    </div>
  </div>
  <div class="mnav">
    <button class="mbtn" onclick="changeMonth(-1)">&#8592;</button>
    <div class="mlabel" id="monthLabel">-</div>
    <button class="mbtn" onclick="changeMonth(1)">&#8594;</button>
  </div>
  <div class="dtabs" id="dayTabs"></div>
  <div id="checkList"></div>
  <div class="sgrow">
    <label>&#128394; ผู้นำรถ / ผู้ตรวจสอบ</label>
    <input class="sginp" id="fSigner" type="text" placeholder="ชื่อ-นามสกุล">
    <label>&#128394; ผู้ควบคุมยาน</label>
    <input class="sginp" id="fSuper" type="text" placeholder="ชื่อ-นามสกุล">
    <label>ตำแหน่งผู้ควบคุมยาน</label>
    <input class="sginp" id="fSuperPos" type="text" placeholder="ตำแหน่ง">
  </div>
  <div class="sumbar">
    <div class="si">&#10003; <span class="bdg bok" id="cntP">0</span></div>
    <div class="si">&#10007; <span class="bdg bfail" id="cntO">0</span></div>
    <div class="si">- <span class="bdg bskip" id="cntD">0</span></div>
    <div class="si">ยังไม่ตรวจ <span class="bdg bskip" id="cntN">19</span></div>
  </div>
</div>

<div class="card" id="defCard" style="display:none;">
  <div class="chdr">
    <span>&#9888;&#65039; ข้อบกพร่องที่พบ</span>
    <button class="hbtn" onclick="addDef()" style="background:rgba(255,255,255,.18);color:#fff;">+ เพิ่ม</button>
  </div>
  <div id="defArea">
    <div id="noDef" style="padding:18px;text-align:center;color:#9ca3af;font-size:16px;">ไม่พบข้อบกพร่อง</div>
  </div>
</div>

<!-- Vehicle Modal -->
<div class="mbg" id="vehModal">
  <div class="mbox">
    <div class="mtitle" id="vehModalTitle">เพิ่มรถใหม่</div>
    <input type="hidden" id="vehId">
    <div class="frow"><label class="flabel">เลขทะเบียน *</label><input class="finp" id="vPlate" type="text" placeholder="กข 1234"></div>
    <div class="frow"><label class="flabel">รหัสรถ</label><input class="finp" id="vCode" type="text" placeholder="รหัส..."></div>
    <div class="frow"><label class="flabel">ยี่ห้อ/รุ่น</label><input class="finp" id="vBrand" type="text" placeholder="Toyota Hilux Revo..."></div>
    <div class="frow"><label class="flabel">ผู้รับผิดชอบ</label><input class="finp" id="vResp" type="text" placeholder="ชื่อผู้รับผิดชอบ"></div>
    <div class="frow"><label class="flabel">หน่วยงาน</label><input class="finp" id="vUnit" type="text" placeholder="กฟฟ. / สาขา..."></div>
    <div class="mbtns">
      <button class="mbtn-cancel" onclick="closeVehModal()">ยกเลิก</button>
      <button class="mbtn-ok" onclick="saveVehicle()">&#128190; บันทึก</button>
    </div>
  </div>
</div>

</div><!-- end max-width -->

<div class="toast" id="toast"></div>

<script>
var EXEC_URL='';
google.script.run.withSuccessHandler(function(u){EXEC_URL=u;}).getScriptUrl();
function goHome(){google.script.run.withSuccessHandler(function(u){window.top.location.href=u+'?page=index';}).getScriptUrl();}
var ITEMS=["เข็มขัดนิรภัย","ไฟส่องสว่าง (สูง-ต่ำ) หน้า-หลัง","ไฟเบรก","ไฟสัญญาณ (ไฟวับวาบ, เลี้ยวซ้าย-ขวา, ถอยหลัง)","กระจกหน้ารถ","กระจกมองข้าง/หลัง","ที่ปัดน้ำฝน","น้ำฉีดกระจก","ระดับน้ำมันเชื้อเพลิง","ระดับน้ำมันหล่อลื่นเครื่องยนต์","การทำงานของแตร","ระบบเบรก (เบรกมือ/เบรกเท้า)","เครื่องปรับอากาศ","สภาพยาง กระทะล้อ และน๊อตยึดล้อ","อุปกรณ์ดับเพลิง","แบตเตอรี่ (ขั้ว, น้ำกลั่น)","ทำความสะอาดด้านในและด้านนอก","ความเสียหายภายใน","ความเสียหายภายนอก"];
var TM=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
var vehicles=[],selVeh=null,monthData={},curY,curM,curD,defCnt=0;
function dim(y,m){return new Date(y,m,0).getDate();}
function init(){var n=new Date();curY=n.getFullYear();curM=n.getMonth()+1;curD=n.getDate();}

function loadVehicles(){
  document.getElementById('vehGrid').innerHTML='<div style="padding:20px;text-align:center;color:#9ca3af;grid-column:1/-1;font-size:17px;">&#9203; กำลังโหลด...</div>';
  google.script.run
    .withSuccessHandler(function(list){vehicles=list||[];renderVehs();})
    .withFailureHandler(function(e){document.getElementById('vehGrid').innerHTML='<div style="padding:20px;color:#dc2626;grid-column:1/-1;font-size:16px;">&#10060; '+e.message+'</div>';})
    .getVehicles();
}

function renderVehs(){
  var el=document.getElementById('vehGrid');
  if(!vehicles.length){el.innerHTML='<div style="padding:20px;text-align:center;color:#9ca3af;grid-column:1/-1;font-size:17px;">ยังไม่มีรถ<br>กด "+ เพิ่มรถ"</div>';return;}
  var h='';
  for(var i=0;i<vehicles.length;i++){
    var v=vehicles[i];var sel=selVeh&&selVeh.vehicle_id===v.vehicle_id;
    h+='<div class="vcard'+(sel?' sel':'')+'" onclick="pickVeh('+i+')">'
      +'<div class="vplate">'+(v.plate||'')+'</div>'
      +'<div class="vbrand">'+(v.brand||'')+'</div>'
      +'<div class="vcode">'+(v.code||'')+'</div>'
      +'<div class="vbtns">'
      +'<button class="vibtn" onclick="event.stopPropagation();editVeh('+i+')" style="background:#e8f0fe;color:#1a3c5e;">&#9998; แก้ไข</button>'
      +'<button class="vibtn" onclick="event.stopPropagation();delVeh('+i+')" style="background:#fee2e2;color:#dc2626;">&#128465;</button>'
      +'</div></div>';
  }
  el.innerHTML=h;
}

function pickVeh(i){
  selVeh=vehicles[i];renderVehs();
  document.getElementById('checkCard').style.display='block';
  document.getElementById('defCard').style.display='block';
  loadMonthly();
}
function openAddVeh(){
  document.getElementById('vehId').value='';
  document.getElementById('vehModalTitle').textContent='เพิ่มรถใหม่';
  ['vPlate','vCode','vBrand','vResp','vUnit'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('vehModal').classList.add('show');
}
function editVeh(i){
  var v=vehicles[i];
  document.getElementById('vehId').value=v.vehicle_id||'';
  document.getElementById('vehModalTitle').textContent='แก้ไขข้อมูลรถ';
  document.getElementById('vPlate').value=v.plate||'';
  document.getElementById('vCode').value=v.code||'';
  document.getElementById('vBrand').value=v.brand||'';
  document.getElementById('vResp').value=v.responsible||'';
  document.getElementById('vUnit').value=v.unit||'';
  document.getElementById('vehModal').classList.add('show');
}
function closeVehModal(){document.getElementById('vehModal').classList.remove('show');}
function saveVehicle(){
  var plate=document.getElementById('vPlate').value.trim();
  if(!plate){showToast('กรุณาใส่เลขทะเบียน','terr');return;}
  var payload={vehicle_id:document.getElementById('vehId').value||'',plate:plate,code:document.getElementById('vCode').value,brand:document.getElementById('vBrand').value,responsible:document.getElementById('vResp').value,unit:document.getElementById('vUnit').value};
  google.script.run.withSuccessHandler(function(r){if(r.success){closeVehModal();loadVehicles();showToast('บันทึกสำเร็จ','tok');}else showToast('Error: '+(r.error||''),'terr');}).saveVehicle(payload);
}
function delVeh(i){
  var v=vehicles[i];if(!confirm('ลบรถ "'+v.plate+'" ?'))return;
  google.script.run.withSuccessHandler(function(r){
    if(r.success){if(selVeh&&selVeh.vehicle_id===v.vehicle_id){selVeh=null;document.getElementById('checkCard').style.display='none';document.getElementById('defCard').style.display='none';}loadVehicles();}
  }).deleteVehicle(v.vehicle_id);
}

function loadMonthly(){
  if(!selVeh)return;
  updateLabel();
  google.script.run
    .withSuccessHandler(function(list){
      monthData={};
      (list||[]).forEach(function(r){
        var d=parseInt(r.check_date.split('-')[2]);
        var res={};try{res=JSON.parse(r.results_json||'{}');}catch(e){}
        var defs=[];try{defs=JSON.parse(r.defects_json||'[]');}catch(e){}
        monthData[d]={results:res,signer:r.signer,supervisor:r.supervisor,supervisorPos:r.supervisor_pos,defects:defs,saved:true};
      });
      buildDayTabs();buildCheckList();
    })
    .withFailureHandler(function(e){showToast('โหลดล้มเหลว: '+e.message,'terr');buildDayTabs();buildCheckList();})
    .getVehicleMonthlyData(selVeh.vehicle_id,curY,curM);
}
function updateLabel(){
  document.getElementById('monthLabel').textContent=TM[curM-1]+' '+(curY+543);
  document.getElementById('checkHdr').textContent='\u2705 '+(selVeh?selVeh.plate:'')+' — '+curD+' '+TM[curM-1]+' '+(curY+543);
}
function changeMonth(d){flush();curM+=d;if(curM>12){curM=1;curY++;}if(curM<1){curM=12;curY--;}monthData={};curD=1;loadMonthly();}
function buildDayTabs(){
  var total=dim(curY,curM);var now=new Date();var isNow=(now.getFullYear()===curY&&now.getMonth()+1===curM);var td=now.getDate();var h='';
  for(var d=1;d<=total;d++){
    var dat=monthData[d];
    var hasFail=dat&&Object.keys(dat.results||{}).some(function(k){return dat.results[k]==='O';});
    var cls='dtab';if(d===curD)cls+=' act';else if(isNow&&d===td)cls+=' today';else if(hasFail)cls+=' fail';else if(dat&&dat.saved)cls+=' saved';
    h+='<button class="'+cls+'" id="dt'+d+'" onclick="selDay('+d+')">'+d+'</button>';
  }
  document.getElementById('dayTabs').innerHTML=h;
  setTimeout(function(){var b=document.getElementById('dt'+curD);if(b)b.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});},80);
}
function selDay(d){flush();curD=d;updateLabel();buildDayTabs();buildCheckList();}
function flush(){
  if(!monthData[curD])monthData[curD]={results:{},signer:'',supervisor:'',supervisorPos:'',defects:[],saved:false};
  for(var i=1;i<=ITEMS.length;i++){var ci=document.getElementById('ci'+i);if(ci)monthData[curD].results[i]=ci.getAttribute('data-v')||'';}
  monthData[curD].signer=document.getElementById('fSigner').value||'';
  monthData[curD].supervisor=document.getElementById('fSuper').value||'';
  monthData[curD].supervisorPos=document.getElementById('fSuperPos').value||'';
  var defs=[];
  document.querySelectorAll('.defrow').forEach(function(row){
    var inp=row.querySelectorAll('input');
    if(inp[0])defs.push({text:inp[0].value||'',date:inp[1]?inp[1].value||'':''});
  });
  monthData[curD].defects=defs;
}
function buildCheckList(){
  var dat=monthData[curD]||{results:{},signer:'',supervisor:'',supervisorPos:'',defects:[]};var h='';
  for(var i=0;i<ITEMS.length;i++){
    var no=i+1;var st=dat.results[no]||'';var rc='ci'+(st==='P'?' stP':st==='O'?' stO':'');
    h+='<div class="'+rc+'" id="ci'+no+'" data-v="'+st+'">'
      +'<div class="cino">'+no+'</div>'
      +'<div class="ciname">'+ITEMS[i]+'</div>'
      +'<div class="cbgrp">'
      +'<button class="cb'+(st==='P'?' aP':'')+'" data-no="'+no+'" data-val="P" onclick="doChk(this)">&#10003;</button>'
      +'<button class="cb'+(st==='O'?' aO':'')+'" data-no="'+no+'" data-val="O" onclick="doChk(this)">&#10007;</button>'
      +'<button class="cb'+(st==='-'?' aD':'')+'" data-no="'+no+'" data-val="-" onclick="doChk(this)">&#9135;</button>'
      +'</div></div>';
  }
  document.getElementById('checkList').innerHTML=h;
  document.getElementById('fSigner').value=dat.signer||'';
  document.getElementById('fSuper').value=dat.supervisor||'';
  document.getElementById('fSuperPos').value=dat.supervisorPos||'';
  defCnt=0;
  var da=document.getElementById('defArea');
  da.innerHTML='<div id="noDef" style="padding:18px;text-align:center;color:#9ca3af;font-size:16px;">ไม่พบข้อบกพร่อง</div>';
  (dat.defects||[]).forEach(function(dx){
    defCnt++;
    document.getElementById('noDef').style.display='none';
    var dc=document.createElement('div');dc.className='defrow';dc.id='def'+defCnt;
    dc.innerHTML='<input class="definp" type="text" value="'+(dx.text||'')+'" placeholder="ระบุข้อบกพร่อง...">'
      +'<input class="definp" type="date" value="'+(dx.date||'')+'">'
      +'<button class="delbtn" onclick="rmDef('+defCnt+')">&#128465; ลบรายการนี้</button>';
    da.appendChild(dc);
  });
  updateSum();
}
function doChk(btn){
  var no=parseInt(btn.dataset.no);var val=btn.dataset.val;
  var ci=document.getElementById('ci'+no);if(!ci)return;
  var cur=ci.getAttribute('data-v');var nv=cur===val?'':val;
  ci.setAttribute('data-v',nv);ci.className='ci'+(nv==='P'?' stP':nv==='O'?' stO':'');
  var bs=ci.querySelectorAll('.cb');
  if(bs[0])bs[0].className='cb'+(nv==='P'?' aP':'');
  if(bs[1])bs[1].className='cb'+(nv==='O'?' aO':'');
  if(bs[2])bs[2].className='cb'+(nv==='-'?' aD':'');
  updateSum();
}
function checkAll(v){
  for(var i=1;i<=ITEMS.length;i++){
    var ci=document.getElementById('ci'+i);if(!ci)continue;
    ci.setAttribute('data-v',v);ci.className='ci'+(v==='P'?' stP':v==='O'?' stO':'');
    var bs=ci.querySelectorAll('.cb');
    if(bs[0])bs[0].className='cb'+(v==='P'?' aP':'');
    if(bs[1])bs[1].className='cb'+(v==='O'?' aO':'');
    if(bs[2])bs[2].className='cb'+(v==='-'?' aD':'');
  }
  updateSum();
}
function updateSum(){
  var p=0,o=0,d=0,n=0;
  for(var i=1;i<=ITEMS.length;i++){var ci=document.getElementById('ci'+i);var st=ci?ci.getAttribute('data-v'):'';if(st==='P')p++;else if(st==='O')o++;else if(st==='-')d++;else n++;}
  document.getElementById('cntP').textContent=p;document.getElementById('cntO').textContent=o;document.getElementById('cntD').textContent=d;document.getElementById('cntN').textContent=n;
}
function addDef(){
  document.getElementById('noDef').style.display='none';defCnt++;
  var dc=document.createElement('div');dc.className='defrow';dc.id='def'+defCnt;
  dc.innerHTML='<input class="definp" type="text" placeholder="ระบุข้อบกพร่อง...">'
    +'<input class="definp" type="date">'
    +'<button class="delbtn" onclick="rmDef('+defCnt+')">&#128465; ลบรายการนี้</button>';
  document.getElementById('defArea').appendChild(dc);
}
function rmDef(id){var el=document.getElementById('def'+id);if(el)el.remove();if(!document.querySelector('.defrow'))document.getElementById('noDef').style.display='block';}

function saveData(){
  if(!selVeh){showToast('กรุณาเลือกรถก่อน','terr');return;}
  flush();
  var dat=monthData[curD]||{};
  var payload={vehicle_id:selVeh.vehicle_id,check_date:curY+'-'+String(curM).padStart(2,'0')+'-'+String(curD).padStart(2,'0'),signer:dat.signer||'',supervisor:dat.supervisor||'',supervisor_pos:dat.supervisorPos||'',results_json:JSON.stringify(dat.results||{}),defects_json:JSON.stringify(dat.defects||[])};
  var btn=document.getElementById('btnSave');btn.disabled=true;btn.textContent='กำลังบันทึก...';
  google.script.run
    .withSuccessHandler(function(r){
      btn.disabled=false;btn.innerHTML='&#128190; บันทึก';
      if(r.success){if(!monthData[curD])monthData[curD]={};monthData[curD].saved=true;buildDayTabs();showToast('\u2714 บันทึกวันที่ '+curD+' สำเร็จ','tok');}
      else showToast('บันทึกล้มเหลว','terr');
    })
    .withFailureHandler(function(e){btn.disabled=false;btn.innerHTML='&#128190; บันทึก';showToast('Error: '+e.message,'terr');})
    .saveVehicleCheck(payload);
}
function thDate(d){if(!d)return'';var p=d.split('-');return parseInt(p[2])+' '+TM[parseInt(p[1])-1]+' '+(parseInt(p[0])+543);}
function doPrint(){if(!selVeh){showToast('กรุณาเลือกรถก่อน','terr');return;}flush();buildPrint();window.print();}

  h+='<div style="font-size:7.5pt;text-align:center;margin-bottom:1mm;">ใช้เครื่องหมายถูก (&#10003;) สำหรับทุกรายการที่อยู่ในสภาพดี&emsp;ใช้เครื่องหมายผิด (&#10007;) สำหรับรายการที่ต้องการซ่อมแซม&emsp;ใช้เครื่องหมาย (-) ในช่องที่ไม่เกี่ยวข้อง</div>';
  h+='<table style="width:100%;border-collapse:collapse;table-layout:fixed;font-size:7.5pt;"><colgroup><col style="width:3%"><col style="width:25%">';

  h+='<col style="width:7%"></colgroup><thead>';
  h+='<tr style="background:#b8ccdc;-webkit-print-color-adjust:exact;print-color-adjust:exact;"><th colspan="'+(3+total)+'" style="'+B+'padding:2px;'+CC+'font-size:8.5pt;font-weight:700;">การตรวจสอบยานพาหนะ</th></tr>';
  h+='<tr style="background:#ccdde8;-webkit-print-color-adjust:exact;print-color-adjust:exact;"><th rowspan="2" style="'+B+'padding:1.5px;'+CC+'">ที่</th><th rowspan="2" style="'+B+'padding:1.5px 3px;'+CC+'">รายการ</th><th colspan="'+total+'" style="'+B+'padding:1.5px;'+CC+'">วันที่</th><th rowspan="2" style="'+B+'padding:1.5px;'+CC+'">ข้อคิดเห็น</th></tr>';
  h+='<tr style="background:#ccdde8;-webkit-print-color-adjust:exact;print-color-adjust:exact;">';
  for(var d=1;d<=total;d++)h+='<th style="'+B+'padding:1px 0;'+CC+'font-size:6.5pt;">'+d+'</th>';
  h+='</tr></thead><tbody>';
  for(var ii=0;ii<ITEMS.length;ii++){

    for(var dd=1;dd<=total;dd++){var r=(monthData[dd]&&monthData[dd].results&&monthData[dd].results[no])||'';var sym=r==='P'?'&#10003;':r==='O'?'&#10007;':r==='-'?'-':'';h+='<td style="'+B+'padding:1px 0;'+CC+'font-weight:700;font-size:9pt;'+(r==='O'?'color:#c00;':'')+'">'+sym+'</td>';}

  for(var dd2=1;dd2<=total;dd2++){var sg2=(monthData[dd2]&&monthData[dd2].signer)||'';h+='<td style="'+B+'padding:0 1px;'+CC+'font-size:5.5pt;vertical-align:bottom;">'+sg2+'</td>';}

  h+='<div style="margin-top:1.5mm;font-size:6.5pt;display:flex;justify-content:space-between;color:#555;"><span>FM1-SOH3-S04-6103 ประกาศใช้ครั้งแรกเมื่อ 30/05/2561</span><span>ปรับปรุงครั้งที่ 00 วันที่ -/-/-</span></div></div>';
