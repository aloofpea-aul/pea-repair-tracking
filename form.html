<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>แบบฟอร์มตรวจประเมิน</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Sarabun',sans-serif;}
body{background:#f0f4f8;color:#1a2b3c;}
.topbar{background:#1a3c5e;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px;}
.topbar .logo{font-size:15px;font-weight:700;}
.topbar .sub{font-size:11px;opacity:.75;margin-top:2px;}
.score-box{background:rgba(255,255,255,.12);border-radius:8px;padding:8px 16px;margin-left:auto;text-align:center;border:1px solid rgba(255,255,255,.2);}
.score-num{font-size:26px;font-weight:700;line-height:1;}
.score-lbl{font-size:10px;opacity:.8;}
.score-grade{font-size:12px;font-weight:700;}
.tab-bar{background:#fff;border-bottom:2px solid #1a3c5e;display:flex;overflow-x:auto;}
.tab-btn{padding:9px 15px;border:none;background:none;cursor:pointer;font-size:12.5px;font-weight:400;color:#1a3c5e;border-bottom:3px solid transparent;white-space:nowrap;font-family:Sarabun,sans-serif;transition:color .15s;}
.tab-btn.active{font-weight:700;color:#e84c0a;border-bottom-color:#e84c0a;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.container{max-width:900px;margin:0 auto;padding:20px;}
.card{background:#fff;border-radius:10px;border:1px solid #dde3ea;margin-bottom:16px;overflow:hidden;}
.card-hdr{background:#1a3c5e;color:#fff;padding:10px 16px;font-size:13.5px;font-weight:700;display:flex;align-items:center;justify-content:space-between;}
.card-hdr .ms{font-size:11px;opacity:.85;}
.card-body{padding:16px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
@media(max-width:580px){.form-row{grid-template-columns:1fr;}}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg label{font-size:12px;font-weight:700;color:#4b5563;}
.fg input,.fg select,.fg textarea{padding:8px 10px;border:1px solid #c8d0da;border-radius:6px;font-size:13px;font-family:Sarabun,sans-serif;width:100%;}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#1a3c5e;}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px;}
.cat-card{background:#fff;border-radius:8px;padding:10px 12px;border:1px solid #dde3ea;}
.cat-card .cat-name{font-size:10px;color:#6b7c8d;line-height:1.3;margin-bottom:4px;}
.cat-card .cat-score{font-size:20px;font-weight:700;color:#1a3c5e;}
.cat-card .cat-max{font-size:11px;color:#9ca3af;}
.cat-bar-bg{height:4px;background:#e5e7eb;border-radius:2px;margin-top:4px;}
.cat-bar-fg{height:4px;background:#e84c0a;border-radius:2px;transition:width .3s;}
.ci{border-bottom:1px solid #edf0f3;padding:13px 0;}
.ci:last-child{border-bottom:none;}
.ci-top{display:flex;align-items:flex-start;gap:10px;}
.ci-no{min-width:26px;height:26px;background:#1a3c5e;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px;}
.ci-content{flex:1;min-width:0;}
.ci-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px;}
.ci-topic{font-size:13px;font-weight:600;line-height:1.5;flex:1;}
.score-chip{padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;flex-shrink:0;}
.score-chip.full{background:#dcfce7;color:#166534;}
.score-chip.zero{background:#fce7f3;color:#9d174d;}
.score-chip.mid{background:#fff3ee;color:#92400e;}
.opt{display:flex;align-items:flex-start;gap:8px;padding:5px 8px;border-radius:6px;cursor:pointer;margin-bottom:3px;font-size:12px;border:1px solid transparent;transition:background .1s;}
.opt:hover{background:#fafafa;}
.opt.selected{background:#fff3ee;border-color:#e84c0a;}
.opt input[type=radio]{accent-color:#e84c0a;flex-shrink:0;margin-top:2px;}
.calc-box{background:#f8fafc;border:1px solid #dde3ea;border-radius:8px;padding:10px;margin-top:6px;}
.calc-formula{font-size:10.5px;color:#6b7c8d;font-family:monospace;margin-bottom:6px;}
.calc-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.calc-pct-input{padding:6px 10px;border:1px solid #c8d0da;border-radius:6px;font-size:13px;font-family:Sarabun,sans-serif;width:100px;}
.calc-pct-input:focus{outline:none;border-color:#e84c0a;}
.calc-hint{font-size:11px;color:#9ca3af;flex:1;}
.calc-result{font-size:12px;color:#e84c0a;font-weight:700;}
.note-input{width:100%;padding:5px 10px;border:1px solid #c8d0da;border-radius:5px;font-size:11.5px;font-family:Sarabun,sans-serif;margin-top:6px;}
.note-input:focus{outline:none;border-color:#1a3c5e;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{background:#1a3c5e;color:#fff;padding:8px 10px;text-align:left;font-weight:600;}
tbody tr:nth-child(even){background:#fafafa;}
tbody td{padding:5px 8px;border-bottom:1px solid #edf0f3;vertical-align:middle;}
.t-inp{width:100%;padding:4px 8px;border:1px solid #c8d0da;border-radius:4px;font-size:12px;font-family:Sarabun,sans-serif;}
.t-inp:focus{outline:none;border-color:#1a3c5e;}
.t-num{text-align:center;color:#9ca3af;font-size:11px;}
.btn-row{display:flex;justify-content:flex-end;gap:10px;padding:16px;background:#fff;border-top:1px solid #dde3ea;}
.btn{padding:10px 24px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:Sarabun,sans-serif;}
.btn-secondary{background:#f0f4f8;color:#1a3c5e;border:1px solid #c8d0da;}
.btn-primary{background:#e84c0a;color:#fff;}
.btn-primary:hover{background:#c93d07;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.toast{position:fixed;top:20px;right:20px;padding:12px 18px;border-radius:8px;font-size:13px;z-index:999;display:none;max-width:340px;color:#fff;}
.toast.show{display:block;}
.t-ok{background:#166534;}.t-err{background:#dc2626;}.t-info{background:#1a3c5e;}
.loading{text-align:center;padding:60px;color:#6b7c8d;}
.ro-input{background:#f8fafc;color:#6b7c8d;}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div>
    <div class="logo">⚡ แบบฟอร์มตรวจประเมินระบบงานแก้ไฟฟ้าขัดข้อง</div>
    <div class="sub">กฟต.2 ประจำปี 2569 | อัพเดท 7 มกราคม 2569</div>
  </div>
  <div class="score-box">
    <div class="score-num" id="totalScore">0</div>
    <div class="score-lbl">/ 100 คะแนน</div>
    <div class="score-grade" id="gradeLabel">—</div>
  </div>
</div>

<!-- Tab bar -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab(0)">📋 แบบฟอร์มหลัก</button>
  <button class="tab-btn" onclick="switchTab(1)">🚗 รถยนต์-เพิ่ม</button>
  <button class="tab-btn" onclick="switchTab(2)">🔧 เครื่องมือ</button>
  <button class="tab-btn" onclick="switchTab(3)">🏢 สถานที่-เพิ่ม</button>
  <button class="tab-btn" onclick="switchTab(4)">🦺 ชุดปฏิบัติการฯ-เพิ่ม</button>
</div>

<!-- Tab 0: Main form -->
<div class="tab-content active" id="tab-0">
  <div class="container">
    <!-- Header card -->
    <div class="card">
      <div class="card-hdr">
        <span>📋 ข้อมูลการตรวจ</span>
        <span class="ms" id="answeredCount">0/33 รายการที่ลงคะแนนแล้ว</span>
      </div>
      <div class="card-body">
        <div class="form-row">
          <div class="fg">
            <label>หน่วยงานที่รับการตรวจ *</label>
            <select id="sid" onchange="updateHeader()">
              <option value="">⏳ กำลังโหลด...</option>
            </select>
          </div>
          <div class="fg">
            <label>วันที่ตรวจ *</label>
            <input type="date" id="idate" value="" onchange="updateHeader()">
          </div>
        </div>
        <div class="form-row">
          <div class="fg">
            <label>ชื่อผู้ตรวจ *</label>
            <input type="text" id="iname" placeholder="ชื่อ-นามสกุล">
          </div>
          <div class="fg">
            <label>Email ผู้ตรวจ</label>
            <input type="email" id="iemail" placeholder="xxx@pea.co.th">
          </div>
        </div>
        <div class="fg">
          <label>หมายเหตุภาพรวม</label>
          <textarea id="gnote" rows="2" placeholder="หมายเหตุ / ข้อสังเกตภาพรวม"></textarea>
        </div>
      </div>
    </div>

    <!-- Category summary -->
    <div class="cat-grid" id="catGrid"></div>

    <!-- Items container -->
    <div id="itemsContainer"></div>

    <!-- Save button -->
    <div class="card">
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="window.top.location.href='?page=index'">← กลับหน้าหลัก</button>
        <button class="btn btn-primary" id="saveBtn" onclick="submitForm()">💾 บันทึกการตรวจ</button>
      </div>
    </div>
  </div>
</div>

<!-- Tabs 1–4: Extra forms (built by JS) -->
<div class="tab-content" id="tab-1"></div>
<div class="tab-content" id="tab-2"></div>
<div class="tab-content" id="tab-3"></div>
<div class="tab-content" id="tab-4"></div>

<div class="toast" id="toast"></div>

let scores = {}, pcts = {}, iNotes = {};

// =========================================================
// SCORE CALCULATION
// =========================================================
function getScore(item) {
  if (item.type === 'calc') {
    const p = parseFloat(pcts[item.id] || 0);
    if (!p || p <= 0) return 0;
    return Math.min(item.max, Math.round(p * item.max / 91 * 100) / 100);
  }
  return parseFloat(scores[item.id]) || 0;
}

function getCatScore(ci) {
  return Math.round(ITEMS.filter(it => it.cat === ci).reduce((s, it) => s + getScore(it), 0) * 10) / 10;
}

function getTotal() {
  return Math.round(ITEMS.reduce((s, it) => s + getScore(it), 0) * 10) / 10;
}

function getGrade(t) {
  if (t >= 90) return {g:'A', lbl:'ดีเยี่ยม', color:'#4ade80'};
  if (t >= 80) return {g:'B', lbl:'ดี', color:'#93c5fd'};
  if (t >= 70) return {g:'C', lbl:'พอใช้', color:'#fcd34d'};
  if (t >= 60) return {g:'D', lbl:'ต้องปรับปรุง', color:'#fb923c'};
  return {g:'F', lbl:'ไม่ผ่าน', color:'#f87171'};
}

function getChipClass(v, max) {
  if (v >= max) return 'score-chip full';
  if (v === 0) return 'score-chip zero';
  return 'score-chip mid';
}

  document.getElementById('itemsContainer').innerHTML = grouped.map(({cat, ci, items}) => `

function buildItem(item, isLast) {
  const scoreHtml = `<span class="${getChipClass(0, item.max)}" id="chip-${item.id}">0/${item.max}</span>`;
  let inputHtml = '';
  if (item.type === 'calc') {
    inputHtml = `
      <div class="calc-box">
        <div class="calc-formula">${item.formula}</div>
        <div class="calc-row">
          <div>
            <label style="font-size:11px;color:#6b7c8d;display:block;margin-bottom:3px">% ความครบถ้วน</label>
            <input type="number" min="0" max="100" step="0.01" class="calc-pct-input"
              id="pct-${item.id}" placeholder="0–100"
              oninput="onPctChange(${item.id})">
          </div>
          <div class="calc-hint">${item.hint}</div>
          <div class="calc-result" id="calcResult-${item.id}" style="display:none"></div>
        </div>
      </div>`;
  } else {
    inputHtml = item.opts.map(opt => `
      <div class="opt" id="opt-${item.id}-${opt.v.replace('.','_')}" onclick="selectOpt(${item.id},'${opt.v}')">

        <span>${opt.l}</span>
      </div>`).join('');
  }

  return `
    <div class="ci" style="${isLast ? 'border-bottom:none' : ''}">
      <div class="ci-top">
        <div class="ci-no">${item.no}</div>
        <div class="ci-content">

// =========================================================
// INTERACTIONS
// =========================================================
function switchTab(i) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${i}`).classList.add('active');
  document.querySelectorAll('.tab-btn')[i].classList.add('active');
  // Sync station/date to extra tabs
  if (i > 0) syncExtraHeader(i - 1);
}

function syncExtraHeader(ti) {
  const sid = document.getElementById('sid');
  const stationName = sid.options[sid.selectedIndex] ? sid.options[sid.selectedIndex].text : '';
  const el1 = document.getElementById(`ex-station-${ti}`);
  const el2 = document.getElementById(`ex-date-${ti}`);
  if (el1) el1.value = stationName;
  if (el2) el2.value = document.getElementById('idate').value || '';
}

function updateHeader() {
  // called when station/date changes - sync extra tabs
}

function selectOpt(itemId, val) {
  scores[itemId] = val;
  // Update radio visual
  document.querySelectorAll(`[id^="opt-${itemId}-"]`).forEach(el => el.classList.remove('selected'));
  const safeVal = val.replace('.', '_');
  const optEl = document.getElementById(`opt-${itemId}-${safeVal}`);
  if (optEl) optEl.classList.add('selected');
  updateScoreDisplay(ITEMS.find(it => it.id === itemId));
  updateTotals();
}

function onPctChange(itemId) {
  const el = document.getElementById(`pct-${itemId}`);
  pcts[itemId] = el ? el.value : '';
  const item = ITEMS.find(it => it.id === itemId);
  const sc = getScore(item);
  const resEl = document.getElementById(`calcResult-${itemId}`);
  if (resEl) {
    if (pcts[itemId] > 0) {
      resEl.style.display = '';
      resEl.textContent = `→ คะแนนที่ได้: ${sc}`;
    } else {
      resEl.style.display = 'none';
    }
  }
  updateScoreDisplay(item);
  updateTotals();
}

function updateScoreDisplay(item) {
  const sc = getScore(item);
  const chip = document.getElementById(`chip-${item.id}`);
  if (chip) {
    chip.textContent = `${sc}/${item.max}`;
    chip.className = getChipClass(sc, item.max);
  }
}

function updateTotals() {
  const total = getTotal();
  const gi = getGrade(total);
  document.getElementById('totalScore').textContent = total;
  const gl = document.getElementById('gradeLabel');
  gl.textContent = `เกรด ${gi.g} — ${gi.lbl}`;
  gl.style.color = gi.color;

  CATS.forEach((cat, ci) => {
    const cs = getCatScore(ci);
    const scEl = document.getElementById(`catScore-${ci}`);
    const barEl = document.getElementById(`catBar-${ci}`);
    const hdrEl = document.getElementById(`catHdrScore-${ci}`);
    if (scEl) scEl.textContent = cs;
    if (barEl) barEl.style.width = `${Math.min(100, cs / cat.max * 100)}%`;
    if (hdrEl) hdrEl.textContent = cs;
  });

  const answered = ITEMS.filter(it => scores[it.id] !== undefined || pcts[it.id]).length;
  document.getElementById('answeredCount').textContent = `${answered}/33 รายการที่ลงคะแนนแล้ว`;
}

  stations = stList || [];
  const sid = document.getElementById('sid');
  const params = new URLSearchParams(window.location.search);
  const pre = params.get('station') || '';
  sid.innerHTML = '<option value="">-- เลือกหน่วยงาน --</option>' +
    stations.map(s => `<option value="${s.station_id}" ${s.station_id === pre ? 'selected' : ''}>${s.name} (${s.type})</option>`).join('');
}

function submitForm() {
  const sid = document.getElementById('sid');
  if (!sid.value) { showToast('กรุณาเลือกหน่วยงาน', 'err'); return; }
  const iname = document.getElementById('iname').value.trim();
  if (!iname) { showToast('กรุณาใส่ชื่อผู้ตรวจ', 'err'); return; }

  const empty = ITEMS.filter(it => scores[it.id] === undefined && !pcts[it.id]);
  if (empty.length > 0 && !confirm(`ยังไม่ได้ลงคะแนน ${empty.length} รายการ ต้องการบันทึกต่อหรือไม่?`)) return;

  const scoreArr = ITEMS.map(item => ({
    item_id: item.id,
    item_no: item.no,
    score: getScore(item),
    pct: item.type === 'calc' ? (parseFloat(pcts[item.id]) || 0) : null,
    note: (document.getElementById(`note-${item.id}`) || {}).value || ''
  }));

  // Collect extra tabs data
  const extraArr = EXTRAS.map((et, ti) => ({
    title: et.title,
    sections: et.sections.map((sec, si) => ({
      name: sec.name,
      rows: Array(sec.n).fill(0).map((_, ri) => ({
        item: (document.getElementById(`ex-${ti}-${si}-${ri}-item`) || {}).value || '',
        qty: (document.getElementById(`ex-${ti}-${si}-${ri}-qty`) || {}).value || '',
        note: (document.getElementById(`ex-${ti}-${si}-${ri}-note`) || {}).value || '',
      })).filter(r => r.item)
    }))
  }));

  const payload = {
    station_id: sid.value,
    station_name: sid.options[sid.selectedIndex].text,
    inspect_date: document.getElementById('idate').value,
    inspector_name: iname,
    inspector_email: document.getElementById('iemail').value,
    note: document.getElementById('gnote').value,
    total_score: getTotal(),
    scores: scoreArr,
    extras: extraArr
  };

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '⏳ กำลังบันทึก...';

  google.script.run
    .withSuccessHandler(res => {
      if (res.success) {
        showToast(`✅ บันทึกสำเร็จ! ${res.total_score}/${res.max_score} คะแนน (${res.percent}%) เกรด ${res.grade}`, 'ok');
        setTimeout(() => { window.top.location.href = '?page=index'; }, 2500);
      } else {
        showToast('บันทึกล้มเหลว: ' + res.error, 'err');
        resetBtn();
      }
    })
    .withFailureHandler(e => { showToast('เกิดข้อผิดพลาด: ' + e.message, 'err'); resetBtn(); })
    .saveInspection(payload);
}

function resetBtn() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = false;
  btn.textContent = '💾 บันทึกการตรวจ';
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show t-${type || 'info'}`;
  setTimeout(() => t.className = 'toast', 5000);
}

// =========================================================
// INIT
// =========================================================
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('idate').value = new Date().toISOString().slice(0, 10);
  buildCatGrid();
  buildItems();
  buildExtraForms();
  updateTotals();

  google.script.run
    .withSuccessHandler(loadStations)
    .withFailureHandler(e => { loadStations([]); console.error(e.message); })
    .getStations();
});
</script>
</body>
</html>
