<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แบบฟอร์มตรวจประเมิน</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Sarabun',sans-serif;}
body{background:#f0f4f8;color:#1a2b3c;}
.topbar{background:#1a3c5e;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px;}
.topbar .logo{font-size:15px;font-weight:700;}
.topbar .sub{font-size:11px;opacity:.75;margin-top:2px;}
.score-box{background:rgba(255,255,255,.12);border-radius:8px;padding:8px 16px;margin-left:auto;text-align:center;border:1px solid rgba(255,255,255,.2);}
.score-num{font-size:26px;font-weight:700;line-height:1;}
.score-lbl{font-size:10px;opacity:.8;}
.score-grade{font-size:12px;font-weight:700;}
.tab-bar{background:#fff;border-bottom:2px solid #1a3c5e;display:flex;overflow-x:auto;}
.tab-btn{padding:9px 15px;border:none;background:none;cursor:pointer;font-size:12.5px;font-weight:400;color:#1a3c5e;border-bottom:3px solid transparent;white-space:nowrap;font-family:Sarabun,sans-serif;}
.tab-btn.active{font-weight:700;color:#e84c0a;border-bottom-color:#e84c0a;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.container{max-width:900px;margin:0 auto;padding:20px;}
.card{background:#fff;border-radius:10px;border:1px solid #dde3ea;margin-bottom:16px;overflow:hidden;}
.card-hdr{background:#1a3c5e;color:#fff;padding:10px 16px;font-size:13.5px;font-weight:700;display:flex;align-items:center;justify-content:space-between;}
.card-hdr .ms{font-size:11px;opacity:.85;}
.card-body{padding:16px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg label{font-size:12px;font-weight:700;color:#4b5563;}
.fg input,.fg select,.fg textarea{padding:8px 10px;border:1px solid #c8d0da;border-radius:6px;font-size:13px;font-family:Sarabun,sans-serif;width:100%;}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px;}
.cat-card{background:#fff;border-radius:8px;padding:10px 12px;border:1px solid #dde3ea;}
.cat-card .cat-name{font-size:10px;color:#6b7c8d;line-height:1.3;margin-bottom:4px;}
.cat-card .cat-score{font-size:20px;font-weight:700;color:#1a3c5e;}
.cat-card .cat-max{font-size:11px;color:#9ca3af;}
.cat-bar-bg{height:4px;background:#e5e7eb;border-radius:2px;margin-top:4px;}
.cat-bar-fg{height:4px;background:#e84c0a;border-radius:2px;}
.ci{border-bottom:1px solid #edf0f3;padding:13px 0;}
.ci-top{display:flex;align-items:flex-start;gap:10px;}
.ci-no{min-width:26px;height:26px;background:#1a3c5e;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px;}
.ci-content{flex:1;min-width:0;}
.ci-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px;}
.ci-topic{font-size:13px;font-weight:600;line-height:1.5;flex:1;}
.ci-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.score-chip{padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.score-chip.full{background:#dcfce7;color:#166534;}
.score-chip.zero{background:#fce7f3;color:#9d174d;}
.score-chip.mid{background:#fff3ee;color:#92400e;}
.btn-q{width:22px;height:22px;border-radius:50%;border:1px solid #c8d0da;background:#f8fafc;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#6b7c8d;font-weight:700;flex-shrink:0;padding:0;line-height:1;}
.btn-q:hover{background:#e8f4ff;border-color:#1a3c5e;color:#1a3c5e;}
.btn-q.active{background:#1a3c5e;border-color:#1a3c5e;color:#fff;}
.criteria-box{display:none;background:#eef6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:#1e40af;line-height:1.7;}
.criteria-box.show{display:block;}
.criteria-title{font-size:11px;font-weight:700;color:#1e3a8a;margin-bottom:4px;}
.opt{display:flex;align-items:flex-start;gap:8px;padding:5px 8px;border-radius:6px;cursor:pointer;margin-bottom:3px;font-size:12px;border:1px solid transparent;}
.opt.selected{background:#fff3ee;border-color:#e84c0a;}
.opt input[type=radio]{accent-color:#e84c0a;flex-shrink:0;margin-top:2px;}
.calc-box{background:#f8fafc;border:1px solid #dde3ea;border-radius:8px;padding:10px;margin-top:6px;}
.calc-formula{font-size:10.5px;color:#6b7c8d;font-family:monospace;margin-bottom:6px;}
.calc-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.calc-pct-input{padding:6px 10px;border:1px solid #c8d0da;border-radius:6px;font-size:13px;font-family:Sarabun,sans-serif;width:100px;}
.calc-hint{font-size:11px;color:#9ca3af;flex:1;}
.calc-result{font-size:12px;color:#e84c0a;font-weight:700;}
.note-input{width:100%;padding:5px 10px;border:1px solid #c8d0da;border-radius:5px;font-size:11.5px;font-family:Sarabun,sans-serif;margin-top:6px;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{background:#1a3c5e;color:#fff;padding:8px 10px;text-align:left;font-weight:600;}
tbody tr:nth-child(even){background:#fafafa;}
tbody td{padding:5px 8px;border-bottom:1px solid #edf0f3;vertical-align:middle;}
.t-inp{width:100%;padding:4px 8px;border:1px solid #c8d0da;border-radius:4px;font-size:12px;font-family:Sarabun,sans-serif;}
.t-num{text-align:center;color:#9ca3af;font-size:11px;}
.btn-row{display:flex;justify-content:flex-end;gap:10px;padding:16px;background:#fff;border-top:1px solid #dde3ea;}
.btn{padding:10px 24px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:Sarabun,sans-serif;}
.btn-secondary{background:#f0f4f8;color:#1a3c5e;border:1px solid #c8d0da;}
.btn-primary{background:#e84c0a;color:#fff;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.toast{position:fixed;top:20px;right:20px;padding:12px 18px;border-radius:8px;font-size:13px;z-index:999;display:none;max-width:340px;color:#fff;}
.toast.show{display:block;}
.t-ok{background:#166534;}.t-err{background:#dc2626;}.t-info{background:#1a3c5e;}
.ro-input{background:#f8fafc;color:#6b7c8d;}

/* Previous inspection highlight styles */
.prev-badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700;margin-left:6px;background:#f0f4f8;color:#6b7c8d;border:1px solid #dde3ea;}
.prev-badge.changed{background:#fef9c3;color:#92400e;border-color:#fbbf24;}
.ci-prev{display:flex;align-items:center;gap:6px;margin-bottom:5px;font-size:11px;color:#9ca3af;padding:4px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #dde3ea;}
.ci-prev.has-change{background:#fef9c3;border-left-color:#f59e0b;color:#78350f;}
.ci.changed-item{border-left:3px solid #f59e0b;}
.prev-info-bar{background:#e8f4ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#1e40af;display:none;}
.prev-info-bar.show{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.prev-info-bar .pi-label{font-weight:700;}
.change-summary{background:#fff3ee;border:1px solid #fbbf24;border-radius:6px;padding:8px 12px;font-size:12px;color:#92400e;margin-bottom:14px;display:none;}
.change-summary.show{display:block;}

/* MOBILE */
@media(max-width:640px){
  .topbar{flex-wrap:wrap;gap:6px;padding:10px 12px;}
  .topbar .logo{font-size:14px;}
  .topbar .sub{font-size:10px;}
  .topbar .spacer{width:100%;order:-1;}
  .topbar a,.topbar button,.btn-back{font-size:11px;padding:5px 9px;border-radius:5px;}
  .container{padding:12px;}
  .stat .num{font-size:26px;}
  .stat{padding:12px;}
  .form-row{grid-template-columns:1fr;}
  .cat-grid{grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;}
  .ci-topic{font-size:12.5px;}
  .opt{padding:9px 10px;margin-bottom:5px;}
  .opt input[type=radio]{width:18px;height:18px;}
  .calc-pct-input{width:90px;}
  .tab-btn{padding:8px 11px;font-size:11.5px;}
  .card-hdr{font-size:12.5px;flex-wrap:wrap;}
  .btn-row{flex-wrap:wrap;gap:8px;padding:12px;}
  .btn{padding:11px 18px;font-size:13px;}
  .filters{gap:6px;}
  .filters input,.filters select{font-size:13px;padding:8px 10px;}
  thead th{padding:7px 6px;font-size:11px;}
  tbody td{padding:8px 6px;font-size:12px;}
  .tbl-wrap{-webkit-overflow-scrolling:touch;}
  .score-box{padding:6px 12px;}
  .score-num{font-size:22px;}
  .score-lbl{font-size:9px;}
  .score-grade{font-size:11px;}
  .fg input,.fg select,.fg textarea{font-size:14px;padding:10px 10px;}
  .fg label{font-size:13px;}
  .note-input{font-size:13px;padding:8px 10px;}
  .btn-q{width:28px;height:28px;font-size:13px;}
  .criteria-box{font-size:12.5px;}
}
</style>

<script>
// ค่า station_id ที่ส่งมาจาก server (inject โดย Code.gs)

var prevScores = {};  // item_id -> {score, pct, note}
var prevInspection = null;

function loadPrevInspection(stationId) {
  prevScores = {};
  prevInspection = null;
  document.getElementById('prevInfoBar').classList.remove('show');
  document.getElementById('changeSummary').classList.remove('show');
  clearPrevHighlights();
  if(!stationId) return;

  google.script.run
    .withSuccessHandler(function(data){
      if(!data) return;
      prevInspection = data.inspection;
      (data.scores || []).forEach(function(s){
        prevScores[String(s.item_id)] = {
          score: parseFloat(s.score) || 0,
          pct  : s.pct || '',
          note : s.note || ''
        };
      });
      // Show info bar
      var bar = document.getElementById('prevInfoBar');
      var dateStr = prevInspection.inspect_date || '';
      document.getElementById('prevInfoText').textContent =
        'ตรวจเมื่อ '+dateStr+' | คะแนน '+prevInspection.total_score+' | '+prevInspection.grade;
      bar.classList.add('show');
      // Show prev values on each item
      showPrevValues();
    })
    .withFailureHandler(function(){})
    .getLatestInspectionByStation(stationId);
}

function clearPrevHighlights(){
  document.querySelectorAll('.ci-prev').forEach(function(el){el.remove();});
  document.querySelectorAll('.ci.changed-item').forEach(function(el){el.classList.remove('changed-item');});
  document.querySelectorAll('.prev-badge').forEach(function(el){el.remove();});
}

function showPrevValues(){
  CHECKLIST.forEach(function(item){
    var prev = prevScores[String(item.item_id)];
    if(!prev) return;
    // Find the ci div for this item
    var ciEl = document.getElementById('ci_'+item.item_id);
    if(!ciEl) return;
    var ciPrev = document.createElement('div');
    ciPrev.className = 'ci-prev';
    ciPrev.id = 'prev_'+item.item_id;
    ciPrev.innerHTML = '&#128196; เก่า: <strong>'+prev.score+'</strong> คะแนน'
      + (prev.note ? ' / '+prev.note : '');
    ciEl.insertBefore(ciPrev, ciEl.querySelector('.ci-top'));
  });
  updateChangeHighlights();
}

function updateChangeHighlights(){
  var changedCount = 0;
  CHECKLIST.forEach(function(item){
    var prev = prevScores[String(item.item_id)];
    if(!prev) return;
    var ciEl = document.getElementById('ci_'+item.item_id);
    var prevEl = document.getElementById('prev_'+item.item_id);
    if(!ciEl) return;
    // Get current score for this item
    var curScore = getCurrentScore(item);
    var isChanged = Math.abs(curScore - prev.score) > 0.001;
    if(isChanged){
      changedCount++;
      ciEl.classList.add('changed-item');
      if(prevEl) prevEl.classList.add('has-change');
    } else {
      ciEl.classList.remove('changed-item');
      if(prevEl) prevEl.classList.remove('has-change');
    }
  });
  var countEl = document.getElementById('prevChangeCount');
  var sumEl = document.getElementById('changeSummary');
  if(changedCount > 0){
    countEl.textContent = changedCount + ' รายการเปลี่ยน';
    countEl.style.display = 'inline-block';
    sumEl.textContent = '⚠️ มีการเปลี่ยนแปลง '+changedCount+' รายการจากการตรวจครั้งก่อน';
    sumEl.classList.add('show');
  } else {
    countEl.style.display = 'none';
    sumEl.classList.remove('show');
  }
}

function getCurrentScore(item){
  // For radio items
  var radios = document.querySelectorAll('input[name="score_'+item.item_id+'"]');
  for(var i=0;i<radios.length;i++){
    if(radios[i].checked) return parseFloat(radios[i].value)||0;
  }
  // For calc items
  var calcInp = document.getElementById('pct_'+item.item_id);
  if(calcInp){
    var pctVal = parseFloat(calcInp.value)||0;
    return Math.round(pctVal/100 * item.max_score * 10)/10;
  }
  return 0;
}

var PRE_STATION_ID = '';

var EXEC_URL='';
google.script.run.withSuccessHandler(function(u){EXEC_URL=u;}).getScriptUrl();
function goHome(){google.script.run.withSuccessHandler(function(u){window.top.location.href=u+'?page=index';}).getScriptUrl();}

window.addEventListener('scroll',function(){

  document.getElementById('btnTop').style.display=atTop?'none':'block';
  document.getElementById('btnBot').style.display=(window.scrollY+window.innerHeight>=document.body.scrollHeight-50)?'none':'block';
});

  4:'- ตรวจสอบสถานะผังอัพเดทล่าสุดไม่เกิน 1 ปี - มีใช้งาน สถานะถูกต้อง เป็นปัจจุบัน ในรูปแบบ ไฟล์ PDF หรือ กระดาษ A0 - ตรวจที่ห้องเวรฯ และ รถยนต์แก้ไฟ',
  5:'- ให้พนักงานประจำห้องเวรแก้ไฟฟ้าขัดข้อง ใช้วิทยุสื่อสารพูดคุยกับวิทยุสื่อสารประจำรถยนต์ สื่อสารกันได้หรือไม่ โดยให้รถยนต์จอดภายในพื้นที่ สนง. แล้วใช้ช่องความถี่แบบเรียกตรง',
  6:'- ให้พนักงานประจำห้องเวรแก้ไฟฟ้าขัดข้อง ใช้วิทยุสื่อสารพูดคุยกับวิทยุสื่อสารประจำรถยนต์ สื่อสารกันได้หรือไม่ โดยให้รถยนต์จอดภายในพื้นที่ สนง. แล้วใช้ช่องความถี่แบบเรียกตรง',
  7:'- โทรศัพท์ (ภายในสำนักงาน, ภายนอกสำนักงาน) มีความพร้อมใช้งาน ตลอดเวลา หรือไม่',
  8:'- มีสมุดโทรศัพท์ / รายชื่อโทรศัพท์ และเป็นปัจจุบัน หรือไม่ (เบอร์ฉุกเฉิน, ผู้บริหารในพื้นที่, ศจฟ.ต.2, กฟฟ.ในสังกัด)',
  9:'ตรวจสอบสมุดแบบฟอร์ม บร.1 ประจำรถยนต์แก้ไฟทุกคัน',
  10:'- ตรวจสอบสภาพห้อง, การจัดวางสิ่งของ, ความสะอาด',
  11:'- ตรวจสอบสภาพห้อง, การจัดวางสิ่งของ, ความสะอาด',
  12:'- ตรวจสอบสภาพห้อง, การจัดวางสิ่งของ, ความสะอาด',
  13:'- ความสะอาด เป็นระเบียบ เรียบร้อย: ตรวจสอบพื้นที่ในการจัดเก็บ ทั้งในด้านความปลอดภัย ความสะอาด เป็นระเบียบ เรียบร้อย - การจัดวาง First In First Out: ความง่ายในการตรวจสอบและความสะดวกในการนำไปใช้งาน',
  14:'- ตรวจนับจำนวนและความพร้อมใช้งาน ตามหนังสือเลขที่ ก.2 กบษ. 2586/2565 กฟภ. (ขั้นมาตรฐาน) ประจำกายและประจำรถยนต์แก้ไฟฟ้าขัดข้องทุกคันที่ กฟฟ. มีใช้งาน - คำนวณตามสูตร: % ความครบถ้วน = (จำนวนที่นับได้ x 100) / จำนวนตามมาตรฐาน | คะแนน = (% ความครบถ้วน x 4) / 91%',
  15:'ตรวจสอบเอกสารการส่งมอบ/การดูแลเครื่องมือเครื่องใช้ ประจำรถยนต์ ในวันที่ตรวจประเมิน และย้อนหลังไม่เกิน 1 เดือน',
  16:'ตรวจสอบว่ามีการนำนวัตกรรมด้านความปลอดภัย / เครื่องมือวัดกระแสไฟฟ้ารั่ว (นอกเหนือจาก Voltage detector) มาใช้ในงานแก้ไฟฟ้าขัดข้องหรือไม่',
  17:'ตรวจสอบว่ามีอนุมัติใช้งานเป็นฉบับปัจจุบันหรือไม่ หนังสือเลขที่ ต.2กบษ.(บร.)1792/2568 ลว. 2 ก.ย.2568 อนุมัติรายการและยอดพัสดุสำรองคลังสำหรับงานแก้ไฟฟ้าขัดข้อง พื้นที่ กฟต.2',
  18:'- ตรวจสอบอุปกรณ์สำรองแก้ไฟพัสดุฉุกเฉิน จากระบบ SAP T-Code MB52 เปรียบเทียบตามอนุมัติเลขที่ ต.2กบษ.(บร.)1792/2568 ลว. 2 ก.ย.2568 และตรวจสอบบัญชีทรัพย์สิน - คะแนน = (% ความครบถ้วน x 2) / 91%',
  19:'- สอบถาม กฟฟ. ว่าสำรองพัสดุที่คลังย่อยเป็นรอบ 7 วัน หรือ 14 วัน - ตรวจสอบอุปกรณ์สำรองแก้ไฟพัสดุฉุกเฉิน จากระบบ SAP T-Code MB52 - คะแนน = (% ความครบถ้วน x 3) / 91%',
  20:'รถยนต์ กฟภ.: ตรวจสอบแผนงาน-ผล บำรุงรักษาประจำปี, ยาง, น้ำมันเครื่อง ของรถยนต์แก้ไฟฟ้าขัดข้องทุกคัน | รถยนต์เช่า: ตรวจสอบเอกสารมอบหมายผู้รับผิดชอบ-ผล บำรุงรักษา (ประจำรถ), ยาง, น้ำมันเครื่อง',
  21:'ตรวจสอบการใช้งานแบบฟอร์ม FM1-SOH3-S04-6103 ย้อนหลัง 1 เดือน',
  22:'- ตรวจสอบสภาพรถยนต์แก้ไฟฟ้าขัดข้องที่ กฟฟ.ใช้งานทุกคัน ตามแบบฟอร์ม FM1-SOH3-S04-6103 ทั้ง 19 รายการ (รายการที่ปกติ = 1 คะแนน) - คะแนน = (จำนวนรายการที่ปกติ x 4) / 19 รายการ',
  23:'ตรวจสอบการสวมใส่เครื่องแต่งกาย/เครื่องแบบ ตามมาตรฐาน กฟภ.',
  24:'ตรวจสอบการสวมใส่เครื่องแต่งกาย/เครื่องแบบ ตามมาตรฐาน กฟภ.',
  25:'- ตรวจนับจำนวนตามหนังสือเลขที่ ก.2 กบษ. 2586/2565 กฟภ. (ขั้นมาตรฐาน) ประจำกายและประจำรถยนต์แก้ไฟฟ้าขัดข้องทุกคัน - คะแนน = (% ความครบถ้วน x 4) / 91%',
  26:'- ตรวจนับจำนวนและความพร้อมใช้งาน ตามหนังสือเลขที่ ก.2 กบษ. 2586/2565 กฟภ. (ขั้นมาตรฐาน) ประจำกายและประจำรถยนต์แก้ไฟฟ้าขัดข้องทุกคัน - คะแนน = (% ความครบถ้วน x 4) / 91%',
  27:'- ตรวจสอบการใช้งาน WeSafe เทียบกับข้อมูลไฟฟ้าขัดข้องจาก OMS ย้อนหลัง 1 เดือน - % ใช้งาน = (จำนวนรายการ WeSafe กรณีไฟฟ้าขัดข้อง x 100) / จำนวนไฟฟ้าขัดข้องจากระบบ OMS ทั้งหมด',
  28:'- สุ่มตรวจการปฏิบัติงานแก้ไฟฟ้าขัดข้อง/ดับไฟปฏิบัติงาน ดูกระบวนการปฏิบัติงานด้านความปลอดภัย ประกอบด้วย 1) ความพร้อมสถานที่ก่อนปฏิบัติงาน 2) ความพร้อมชุดทีมงาน (PPE) 3) ความพร้อมรถยนต์ 4) ขั้นตอนความปลอดภัย (WeSafe, KYT, การทำกราวด์) 5) ความเข้าใจขั้นตอนปฏิบัติงาน - หากไม่มีเหตุการณ์ ให้จำลองเหตุการณ์เปลี่ยน Drop ต้นหม้อแปลง',
  29:'ตรวจผลดำเนินงาน การบริหารเหตุการณ์และปรับปรุงประมาณการ/เวลาจ่ายไฟกลับคืน หลังจากได้รับแจ้งเหตุการณ์ไฟฟ้าขัดข้องในเชิง Realtime ภายใน 1 ชั่วโมง (สะสมตั้งแต่วันที่ 1 ม.ค.69 - ปัจจุบัน)',
  30:'ตรวจผลดำเนินงาน บริหารเหตุการณ์แผนดับไฟหม้อแปลงจำหน่ายแรงต่ำ ในวันที่ปฏิบัติงาน และแจ้งข้อมูลวันเวลาขอดับไฟฟ้าให้แก่ผู้ใช้ไฟทราบก่อนวันเริ่มปฏิบัติงานภายใน 3 วันทำการ',
  31:'- กฟจ., กฟส.L/M, S: ตรวจสอบบันทึกแจ้งแผนดับไฟหม้อแปลงจำหน่ายแรงต่ำ (วันที่มีการอนุมัติแผน เทียบกับ วันปฏิบัติงาน ต้องมากกว่าเกณฑ์ 14 วัน) - กฟส.XS: ให้คะแนนเต็ม 2 เนื่องจากดำเนินการโดย กฟฟ.ต้นสังกัด',
  32:'- กฟจ., กฟส.L/M, S: ตรวจสอบการเปิดเหตุการณ์แผนดับไฟหม้อแปลงจำหน่ายแรงต่ำ เทียบกับแผนดับไฟที่ได้รับมา - กฟส.XS: ให้คะแนนเต็ม 3 เนื่องจากดำเนินการโดย กฟฟ.ต้นสังกัด',
  33:'ตรวจสอบผลการแก้ไขข้อบกพร่อง จากการตรวจจากปีก่อนหน้า'
};

var scores={},pcts={},stations=[];

function getScore(item){
  if(item.type==='calc'){var p=parseFloat(pcts[item.id]||0);if(!p||p<=0)return 0;return Math.min(item.max,Math.round(p*item.max/91*100)/100);}
  return parseFloat(scores[item.id])||0;
}
function getCatScore(ci){return Math.round(ITEMS.filter(function(it){return it.cat===ci;}).reduce(function(s,it){return s+getScore(it);},0)*10)/10;}
function getTotal(){return Math.round(ITEMS.reduce(function(s,it){return s+getScore(it);},0)*10)/10;}
function getGrade(t){
  if(t>=90)return{g:'A',lbl:'ดีเยี่ยม',color:'#4ade80'};
  if(t>=80)return{g:'B',lbl:'ดี',color:'#93c5fd'};
  if(t>=70)return{g:'C',lbl:'พอใช้',color:'#fcd34d'};
  if(t>=60)return{g:'D',lbl:'ต้องปรับปรุง',color:'#fb923c'};
  return{g:'F',lbl:'ไม่ผ่าน',color:'#f87171'};
}
function chipCls(v,max){return v>=max?'score-chip full':v===0?'score-chip zero':'score-chip mid';}

function toggleCriteria(id){
  var box=document.getElementById('crit-'+id);
  var btn=document.getElementById('qbtn-'+id);
  if(!box)return;
  if(box.classList.contains('show')){box.classList.remove('show');btn.classList.remove('active');}
  else{box.classList.add('show');btn.classList.add('active');}
}

function buildCatGrid(){
  document.getElementById('catGrid').innerHTML=CATS.map(function(c,ci){
    return '<div class="cat-card"><div class="cat-name">'+c.name+'</div>'
      +'<div class="cat-score" id="catScore-'+ci+'">0</div>'
      +'<div class="cat-max">/ '+c.max+' คะแนน</div>'
      +'<div class="cat-bar-bg"><div class="cat-bar-fg" id="catBar-'+ci+'" style="width:0%"></div></div></div>';
  }).join('');
}

function buildItems(){
  document.getElementById('itemsContainer').innerHTML=CATS.map(function(cat,ci){
    var items=ITEMS.filter(function(it){return it.cat===ci;});
    return '<div class="card"><div class="card-hdr"><span>'+cat.name+'</span>'
      +'<span class="ms">ได้ <span id="catHdrScore-'+ci+'">0</span> / '+cat.max+' คะแนน</span></div>'
      +'<div class="card-body">'+items.map(function(item,ii){return buildItem(item,ii===items.length-1);}).join('')+'</div></div>';
  }).join('');
}

function buildItem(item,isLast){
  var hasCrit=CRITERIA[item.id];
  var critBtn=hasCrit?'<button class="btn-q" id="qbtn-'+item.id+'" onclick="toggleCriteria('+item.id+')" title="ดูวิธีการตรวจ">?</button>':'';
  var critText=hasCrit?CRITERIA[item.id].replace(/ - /g,'<br>- ').replace(/ \| /g,'<br>'):'';
  var critBox=hasCrit?'<div class="criteria-box" id="crit-'+item.id+'"><div class="criteria-title">วิธีการตรวจ</div>'+critText+'</div>':'';
  var inp='';
  if(item.type==='calc'){
    inp='<div class="calc-box"><div class="calc-formula">'+item.formula+'</div>'
      +'<div class="calc-row"><div>'
      +'<label style="font-size:11px;color:#6b7c8d;display:block;margin-bottom:3px">% ความครบถ้วน</label>'
      +'<input type="number" min="0" max="100" step="0.01" class="calc-pct-input" id="pct-'+item.id+'" placeholder="0-100" oninput="onPctChange('+item.id+')">'
      +'</div><div class="calc-hint">'+item.hint+'</div>'
      +'<div class="calc-result" id="calcResult-'+item.id+'" style="display:none"></div></div></div>';
  } else {
    inp=(item.opts||[]).map(function(o){
      return '<div class="opt" id="opt-'+item.id+'-'+o.v.replace('.','_')+'" onclick="selOpt('+item.id+',\''+o.v+'\')">'
        +'<input type="radio" name="item-'+item.id+'" value="'+o.v+'"><span>'+o.l+'</span></div>';
    }).join('');
  }
  return '<div class="ci" style="'+(isLast?'border-bottom:none':'')+'">'
    +'<div class="ci-top"><div class="ci-no">'+item.no+'</div>'
    +'<div class="ci-content"><div class="ci-head"><div class="ci-topic">'+item.topic+'</div>'
    +'<div class="ci-actions"><span class="'+chipCls(0,item.max)+'" id="chip-'+item.id+'">0/'+item.max+'</span>'+critBtn+'</div></div>'
    +critBox+inp
    +'<input class="note-input" type="text" id="note-'+item.id+'" placeholder="หมายเหตุรายการนี้...">'
    +'</div></div></div>';
}

function buildExtraForms(){
  EXTRAS.forEach(function(et,ti){
    var secs=et.sections.map(function(sec,si){
      var rows=Array(sec.n).fill(0).map(function(_,ri){
        return '<tr><td class="t-num">'+(ri+1)+'</td>'
          +'<td><input class="t-inp" id="ex-'+ti+'-'+si+'-'+ri+'-item" placeholder="ระบุรายการ..."></td>'
          +'<td><input class="t-inp" id="ex-'+ti+'-'+si+'-'+ri+'-qty" placeholder="จำนวน" style="text-align:center"></td>'
          +'<td><input class="t-inp" id="ex-'+ti+'-'+si+'-'+ri+'-note" placeholder="หมายเหตุ"></td></tr>';
      }).join('');
      return '<div class="card"><div class="card-hdr">'+sec.name+'</div>'
        +'<div class="tbl-wrap"><table><thead><tr><th style="width:36px">ที่</th><th>ผลการตรวจประเมิน</th><th style="width:80px">จำนวน</th><th style="width:140px">หมายเหตุ</th></tr></thead>'
        +'<tbody>'+rows+'</tbody></table></div></div>';

      +'</div></div></div>'+secs
      +'<div class="card"><div class="btn-row"><button class="btn btn-secondary" onclick="switchTab(0)">กลับแบบฟอร์มหลัก</button></div></div>'

function switchTab(i){
  document.querySelectorAll('.tab-content').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.tab-btn').forEach(function(el){el.classList.remove('active');});
  document.getElementById('tab-'+i).classList.add('active');
  document.querySelectorAll('.tab-btn')[i].classList.add('active');
  if(i>0)syncExtra(i-1);
}
function syncExtra(ti){
  var sid=document.getElementById('sid');
  var name=sid.options[sid.selectedIndex]?sid.options[sid.selectedIndex].text:'';
  var e1=document.getElementById('ex-station-'+ti);
  var e2=document.getElementById('ex-date-'+ti);
  if(e1)e1.value=name;
  if(e2)e2.value=document.getElementById('idate').value||'';
}

// เมื่อเลือกหน่วยงาน → โหลดคณะกรรมการที่รับผิดชอบ
function onStationChange(){
  var sid=document.getElementById('sid').value;
  loadPrevInspection(sid);
  if(sid) loadCommittees(sid);
  else{
    var sel=document.getElementById('icommittee');
    sel.innerHTML='<option value="">-- เลือกคณะ (ถ้ามี) --</option>';
  }
}

// โหลดคณะกรรมการตามหน่วยงาน
function loadCommittees(stationId){
  var sel=document.getElementById('icommittee');
  sel.innerHTML='<option value="">-- เลือกคณะ (ถ้ามี) --</option>';
  google.script.run.withSuccessHandler(function(list){
    (list||[]).forEach(function(c){
      var opt=document.createElement('option');
      opt.value=c.committee_id;
      opt.textContent=c.name;
      opt.dataset.members=c.members||'';
      sel.appendChild(opt);
    });
    // ถ้ามีคณะเดียว เลือกให้อัตโนมัติ
    if(sel.options.length===2){
      sel.selectedIndex=1;
      fillCommittee();
    }
  }).getCommitteesByStation(stationId||'');
}

// เติมชื่อกรรมการอัตโนมัติเมื่อเลือกคณะ
function fillCommittee(){
  var sel=document.getElementById('icommittee');
  var opt=sel.options[sel.selectedIndex];
  if(!opt||!opt.dataset||!opt.dataset.members)return;
  var members=opt.dataset.members.split('|').map(function(m){return m.trim();}).filter(function(m){return m;}).join('\n');
  if(members) document.getElementById('iname').value=members;
}

function selOpt(itemId,val){
  scores[itemId]=val;
  document.querySelectorAll('[id^="opt-'+itemId+'-"]').forEach(function(el){el.classList.remove('selected');});
  var el=document.getElementById('opt-'+itemId+'-'+val.replace('.','_'));
  if(el)el.classList.add('selected');
  refreshChip(ITEMS.find(function(it){return it.id===itemId;}));
  updateTotals();
}
function onPctChange(itemId){
  var el=document.getElementById('pct-'+itemId);
  pcts[itemId]=el?el.value:'';
  var item=ITEMS.find(function(it){return it.id===itemId;});
  var sc=getScore(item);
  var r=document.getElementById('calcResult-'+itemId);
  if(r){if(pcts[itemId]>0){r.style.display='';r.textContent='คะแนนที่ได้: '+sc;}else{r.style.display='none';}}
  refreshChip(item);updateTotals();
}
function refreshChip(item){
  var sc=getScore(item);
  var chip=document.getElementById('chip-'+item.id);
  if(chip){chip.textContent=sc+'/'+item.max;chip.className=chipCls(sc,item.max);}
}
function updateTotals(){
  var total=getTotal();var gi=getGrade(total);
  document.getElementById('totalScore').textContent=total;
  var gl=document.getElementById('gradeLabel');
  gl.textContent='เกรด '+gi.g+' - '+gi.lbl;gl.style.color=gi.color;
  CATS.forEach(function(cat,ci){
    var cs=getCatScore(ci);
    var s=document.getElementById('catScore-'+ci);var b=document.getElementById('catBar-'+ci);var h=document.getElementById('catHdrScore-'+ci);
    if(s)s.textContent=cs;if(b)b.style.width=Math.min(100,cs/cat.max*100)+'%';if(h)h.textContent=cs;
  });
  var ans=ITEMS.filter(function(it){return scores[it.id]!==undefined||pcts[it.id];}).length;
  document.getElementById('answeredCount').textContent=ans+'/33 รายการที่ลงคะแนนแล้ว';
}

function loadStations(stList){
  stations=stList||[];
  var sid=document.getElementById('sid');
  var pre=PRE_STATION_ID||'';
  sid.innerHTML='<option value="">-- เลือกหน่วยงาน --</option>'
    +stations.map(function(s){
      return '<option value="'+s.station_id+'"'+(s.station_id===pre?' selected':'')+'>'+s.name+' ('+s.type+')</option>';
    }).join('');
  // ถ้ามีการ pre-select → โหลดคณะกรรมการ
  if(pre){
    loadCommittees(pre);
  }
}

function submitForm(){
  var sid=document.getElementById('sid');
  if(!sid.value){showToast('กรุณาเลือกหน่วยงาน','err');return;}
  var iname=document.getElementById('iname').value.trim();
  if(!iname){showToast('กรุณาใส่ชื่อผู้ตรวจ','err');return;}
  var empty=ITEMS.filter(function(it){return scores[it.id]===undefined&&!pcts[it.id];});
  if(empty.length>0&&!confirm('ยังไม่ได้ลงคะแนน '+empty.length+' รายการ ต้องการบันทึกต่อหรือไม่?'))return;
  var scoreArr=ITEMS.map(function(item){
    return{item_id:item.id,item_no:item.no,score:getScore(item),
      pct:item.type==='calc'?(parseFloat(pcts[item.id])||0):null,
      note:(document.getElementById('note-'+item.id)||{}).value||''};
  });
  var extraArr=EXTRAS.map(function(et,ti){
    return{title:et.title,sections:et.sections.map(function(sec,si){
      return{name:sec.name,rows:Array(sec.n).fill(0).map(function(_,ri){
        return{item:(document.getElementById('ex-'+ti+'-'+si+'-'+ri+'-item')||{}).value||'',
          qty:(document.getElementById('ex-'+ti+'-'+si+'-'+ri+'-qty')||{}).value||'',
          note:(document.getElementById('ex-'+ti+'-'+si+'-'+ri+'-note')||{}).value||''};
      }).filter(function(r){return r.item;})};
    })};
  });
  var payload={
    station_id:sid.value,station_name:sid.options[sid.selectedIndex].text,
    inspect_date:document.getElementById('idate').value,
    inspector_name:iname,inspector_email:document.getElementById('iemail').value,
    committee_id:document.getElementById('icommittee').value||'',
    note:document.getElementById('gnote').value,
    total_score:getTotal(),scores:scoreArr,extras:extraArr
  };
  var btn=document.getElementById('saveBtn');
  btn.disabled=true;btn.textContent='กำลังบันทึก...';
  google.script.run
    .withSuccessHandler(function(res){
      if(res.success){
        showToast('บันทึกสำเร็จ! '+res.total_score+'/'+res.max_score+' คะแนน ('+res.percent+'%) เกรด '+res.grade,'ok');
        setTimeout(function(){goHome();},2500);
      }else{showToast('บันทึกล้มเหลว: '+res.error,'err');resetBtn();}
    })
    .withFailureHandler(function(e){showToast('เกิดข้อผิดพลาด: '+e.message,'err');resetBtn();})
    .saveInspection(payload);
}
function resetBtn(){var btn=document.getElementById('saveBtn');btn.disabled=false;btn.textContent='บันทึกการตรวจ';}
function showToast(msg,type){
  var t=document.getElementById('toast');t.textContent=msg;
  t.className='toast show t-'+(type||'info');
  setTimeout(function(){t.className='toast';},5000);
}

document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('idate').value=new Date().toISOString().slice(0,10);
  buildCatGrid();buildItems();buildExtraForms();updateTotals();
  google.script.run
    .withSuccessHandler(loadStations)
    .withFailureHandler(function(e){loadStations([]);console.error(e.message);})
    .getStations();
});
</script>
</body>
