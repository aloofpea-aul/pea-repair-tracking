<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายงานผลการตรวจประเมิน</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Sarabun',sans-serif;}
body{background:#f0f4f8;color:#1a2b3c;}
.topbar{background:#1a3c5e;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px;}
.topbar .logo{font-size:15px;font-weight:700;}
.topbar .sub{font-size:11px;opacity:.75;margin-top:2px;}
.tab-bar{background:#fff;border-bottom:2px solid #1a3c5e;display:flex;}
.tab-btn{padding:10px 18px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:400;color:#1a3c5e;border-bottom:3px solid transparent;font-family:Sarabun,sans-serif;}
.tab-btn.active{font-weight:700;color:#e84c0a;border-bottom-color:#e84c0a;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.container{max-width:1400px;margin:0 auto;padding:20px;}
.card{background:#fff;border-radius:10px;border:1px solid #dde3ea;margin-bottom:20px;overflow:hidden;}
.card-hdr{background:#1a3c5e;color:#fff;padding:10px 16px;font-size:13.5px;font-weight:700;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:11.5px;}
thead th{background:#1a3c5e;color:#fff;padding:7px 8px;text-align:center;font-weight:600;white-space:nowrap;position:sticky;top:0;z-index:1;}
thead th.th-left{text-align:left;}
tbody tr:hover{background:#f5f8fb;}
tbody td{padding:5px 8px;border-bottom:1px solid #edf0f3;white-space:nowrap;}
.td-no{text-align:center;color:#9ca3af;width:36px;}
.td-topic{white-space:normal;min-width:160px;max-width:280px;line-height:1.4;}
.td-max{text-align:center;width:52px;color:#6b7c8d;}
.td-score{text-align:center;width:52px;}
.tr-cat{background:#eef3f8;}
.tr-cat td{font-weight:700;color:#1a3c5e;font-size:12px;padding:6px 8px;}
.tr-total{background:#1a3c5e;}
.tr-total td{color:#fff;font-weight:700;font-size:12px;padding:7px 8px;}
.score-null{color:#d1d5db;}
.score-full{color:#166534;font-weight:700;}
.score-hi{color:#1e40af;font-weight:600;}
.score-mid{color:#92400e;}
.score-lo{color:#dc2626;}
.badge-A{background:#dcfce7;color:#166534;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;}
.badge-B{background:#dbeafe;color:#1e40af;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;}
.badge-C{background:#fef9c3;color:#713f12;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;}
.badge-D{background:#ffedd5;color:#9a3412;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;}
.badge-F{background:#fee2e2;color:#991b1b;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;}
.btn-print{background:#e84c0a;color:#fff;border:none;padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:Sarabun,sans-serif;white-space:nowrap;}
.btn-print:hover{background:#c93d07;}
.btn-back{color:#fff;text-decoration:none;font-size:13px;opacity:.85;cursor:pointer;background:rgba(255,255,255,.15);padding:6px 12px;border-radius:6px;border:none;}
.loading{text-align:center;padding:60px;color:#6b7c8d;font-size:14px;}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px;}
.stat-card{background:#fff;border-radius:8px;padding:10px 12px;border:1px solid #dde3ea;text-align:center;}
.stat-num{font-size:22px;font-weight:700;color:#1a3c5e;}
.stat-lbl{font-size:10px;color:#6b7c8d;margin-top:2px;}
.print-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:9999;overflow:auto;padding:20px;}
.print-close{position:fixed;top:16px;right:20px;background:#e84c0a;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:13px;cursor:pointer;z-index:10000;}

@media print {
  body > *{display:none !important;}
  .print-overlay{display:block !important;position:static !important;padding:0 !important;}
  .print-close{display:none !important;}
  @page{size:A4 landscape;margin:10mm;}
}
.print-title{font-size:14px;font-weight:700;color:#1a3c5e;margin-bottom:12px;text-align:center;}
.print-table{width:100%;border-collapse:collapse;font-size:10px;}
.print-table th,.print-table td{border:0.5px solid #c8d0da;padding:3px 5px;}
.print-table th{background:#1a3c5e;color:#fff;text-align:center;}
.print-table .pt-cat td{background:#eef3f8;font-weight:700;color:#1a3c5e;}
.print-table .pt-total td{background:#1a3c5e;color:#fff;font-weight:700;}
/* MOBILE */
@media(max-width:640px){
  .topbar{flex-wrap:wrap;gap:6px;padding:10px 12px;}
  .topbar .logo{font-size:14px;}
  .topbar .sub{font-size:10px;}
  .topbar .spacer{width:100%;order:-1;}
  .topbar a,.topbar button,.btn-back{font-size:11px;padding:5px 9px;border-radius:5px;}
  .container{padding:12px;}
  .stat .num{font-size:26px;}
  .stat{padding:12px;}
  .form-row{grid-template-columns:1fr;}
  .cat-grid{grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;}
  .ci-topic{font-size:12.5px;}
  .opt{padding:9px 10px;margin-bottom:5px;}
  .opt input[type=radio]{width:18px;height:18px;}
  .calc-pct-input{width:90px;}
  .tab-btn{padding:8px 11px;font-size:11.5px;}
  .card-hdr{font-size:12.5px;flex-wrap:wrap;}
  .btn-row{flex-wrap:wrap;gap:8px;padding:12px;}
  .btn{padding:11px 18px;font-size:13px;}
  .filters{gap:6px;}
  .filters input,.filters select{font-size:13px;padding:8px 10px;}
  thead th{padding:7px 6px;font-size:11px;}
  tbody td{padding:8px 6px;font-size:12px;}
  .tbl-wrap{-webkit-overflow-scrolling:touch;}
  .score-box{padding:6px 12px;}
  .score-num{font-size:22px;}
  .score-lbl{font-size:9px;}
  .score-grade{font-size:11px;}
  .fg input,.fg select,.fg textarea{font-size:14px;padding:10px 10px;}
  .fg label{font-size:13px;}
  .note-input{font-size:13px;padding:8px 10px;}
  .btn-q{width:28px;height:28px;font-size:13px;}
  .criteria-box{font-size:12.5px;}
}
</style>



<style id="desktop-override">
/* Mobile default */
html,body { font-size: 18px !important; }
/* Desktop scaling */
@media(min-width: 768px){
  html,body { font-size: 14px !important; }
  .topbar, .tb { padding: 10px 20px !important; }
  .btn, .tbtn { font-size: 13px !important; padding: 8px 14px !important; min-height: auto !important; }
  table { font-size: 13px !important; }
  input, select, textarea { font-size: 13px !important; min-height: auto !important; padding: 7px 10px !important; }
  .container { max-width: 1100px; margin: 0 auto; }
}
</style>
</head>
<body>
<div class="topbar">
  <div>
    <div class="logo">&#9889; รายงานผลการตรวจประเมินระบบงานแก้ไฟฟ้าขัดข้อง</div>
    <div class="sub">กฟต.2 ประจำปี 2569</div>
  </div>
  <button class="btn-back" onclick="goHome()">← กลับหน้าหลัก</button>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('lm')">กฟจ. / กฟส.L-M</button>
  <button class="tab-btn" onclick="switchTab('s')">กฟส.S</button>
  <button class="tab-btn" onclick="switchTab('xs')">กฟส.XS</button>
</div>

<div class="tab-content active" id="tab-lm"><div class="container"><div class="loading" id="load-lm">&#8987; กำลังโหลดข้อมูล...</div></div></div>
<div class="tab-content" id="tab-s"><div class="container"><div class="loading" id="load-s">&#8987; กำลังโหลดข้อมูล...</div></div></div>
<div class="tab-content" id="tab-xs"><div class="container"><div class="loading" id="load-xs">&#8987; กำลังโหลดข้อมูล...</div></div></div>

<div class="print-overlay" id="printOverlay">
  <button class="print-close" onclick="closePrint()">ปิด</button>
  <div id="printContent"></div>
</div>

<script>
var EXEC_URL='';
var REPORT_DATA=null;
google.script.run.withSuccessHandler(function(u){EXEC_URL=u;}).getScriptUrl();

function goHome(){google.script.run.withSuccessHandler(function(u){window.top.location.href=u+'?page=index';}).getScriptUrl();}

function switchTab(key){
  document.querySelectorAll('.tab-btn').forEach(function(b,i){
    b.classList.toggle('active',['lm','s','xs'][i]===key);
  });
  document.querySelectorAll('.tab-content').forEach(function(t,i){
    t.classList.toggle('active',['tab-lm','tab-s','tab-xs'][i]==='tab-'+key);
  });
}

function grade(s){
  if(s===null||s===undefined||s==='')return'—';
  if(s>=90)return'A';if(s>=80)return'B';if(s>=70)return'C';if(s>=60)return'D';return'F';
}
function gradeClass(g){return'badge-'+g;}
function scoreClass(s,max){
  if(s===null||s==='')return'score-null';
  if(s>=max)return'score-full';
  if(s>=max*0.75)return'score-hi';
  if(s>=max*0.5)return'score-mid';
  return'score-lo';
}
function fmt(v){return(v===null||v===undefined||v==='')? '<span class="score-null">—</span>': String(v);}

function buildGroupHtml(g,totals){
  if(!g)return'<div class="loading">ไม่พบข้อมูล</div>';
  var stations=g.stations;
  var inspected=stations.filter(function(st){return totals&&totals[st]>0;});

  // Summary cards
  var cards='<div class="summary-grid">';
  cards+='<div class="stat-card"><div class="stat-num">'+stations.length+'</div><div class="stat-lbl">หน่วยงานทั้งหมด</div></div>';
  cards+='<div class="stat-card"><div class="stat-num">'+inspected.length+'</div><div class="stat-lbl">ตรวจแล้ว</div></div>';
  cards+='<div class="stat-card"><div class="stat-num">'+(stations.length-inspected.length)+'</div><div class="stat-lbl">ยังไม่ได้ตรวจ</div></div>';
  if(inspected.length>0){
    var avg=Math.round(inspected.reduce(function(s,st){return s+(totals[st]||0);},0)/inspected.length*10)/10;
    cards+='<div class="stat-card"><div class="stat-num">'+avg+'</div><div class="stat-lbl">คะแนนเฉลี่ย</div></div>';
  }
  cards+='</div>';

  // Buttons row
  var btns='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">';
  stations.forEach(function(st){
    btns+='<button class="btn-print" onclick="printStation(\''+st+'\',\''+g.key+'\')">&#128438; '+st+'</button>';
  });
  btns+='</div>';

  // Table
  var h='<div class="tbl-wrap"><table><thead><tr>';
  h+='<th class="th-left" style="min-width:36px">ที่</th>';
  h+='<th class="th-left" style="min-width:180px">หัวข้อ</th>';
  h+='<th>เต็ม</th>';
  stations.forEach(function(st){
    var tot=totals&&totals[st]?totals[st]:'—';
    var g2=totals&&totals[st]?grade(totals[st]):'—';
    h+='<th style="min-width:52px">'+st+'<br><span style="font-size:9px;opacity:.8">('+tot+')</span></th>';
  });
  h+='</tr></thead><tbody>';

  var currentCat='';
  g.items.forEach(function(item){
    if(item.cat!==currentCat){
      currentCat=item.cat;
      h+='<tr class="tr-cat"><td colspan="'+(3+stations.length)+'">'+currentCat+'</td></tr>';
    }
    h+='<tr><td class="td-no">'+item.no+'</td>';
    h+='<td class="td-topic">'+item.topic+'</td>';
    h+='<td class="td-max">'+item.max+'</td>';
    stations.forEach(function(st){
      var sc=item.scores[st];
      var cls=sc!==null&&sc!==undefined&&sc!==''?scoreClass(sc,item.max):'score-null';
      h+='<td class="td-score '+cls+'">'+fmt(sc)+'</td>';
    });
    h+='</tr>';
  });

  // Total row
  if(totals){
    h+='<tr class="tr-total"><td></td><td>รวมคะแนน</td><td>100</td>';
    stations.forEach(function(st){
      var t=totals[st];
      var g2=t?grade(t):'—';
      h+='<td style="text-align:center">'+(t||'—')+(t?'<br><span style="font-size:9px">['+g2+']</span>':'')+'</td>';
    });
    h+='</tr>';
  }

  h+='</tbody></table></div>';
  return cards+btns+'<div class="card"><div class="card-hdr">ตารางคะแนนรายข้อ — '+g.title+'</div>'+h+'</div>';
}

function renderAll(data){
  REPORT_DATA=data;
  ['lm','s','xs'].forEach(function(key){
    var g=data[key];
    var totals=data[key+'_totals']||{};
    var container=document.getElementById('tab-'+key).querySelector('.container');
    container.innerHTML=buildGroupHtml(g,totals);
  });
}

function printStation(stName, groupKey){
  if(!REPORT_DATA)return;
  var g=REPORT_DATA[groupKey];
  var totals=REPORT_DATA[groupKey+'_totals']||{};
  if(!g)return;

  var total=totals[stName]||'—';
  var g2=totals[stName]?grade(totals[stName]):'—';

  var h='<div class="print-title">รายงานผลการตรวจประเมินระบบงานแก้ไฟฟ้าขัดข้อง ประจำปี 2569<br>';
  h+='หน่วยงาน: '+stName+' | กลุ่ม: '+g.title+'</div>';
  h+='<table class="print-table"><thead><tr>';
  h+='<th style="width:32px">ที่</th><th style="min-width:200px;text-align:left">หัวข้อ</th>';
  h+='<th style="width:50px">เต็ม</th><th style="width:60px">คะแนน</th><th style="width:60px">%</th></tr></thead><tbody>';

  var currentCat='';
  g.items.forEach(function(item){
    if(item.cat!==currentCat){
      currentCat=item.cat;
      h+='<tr class="pt-cat"><td colspan="5">'+currentCat+'</td></tr>';
    }
    var sc=item.scores[stName];
    var pct=sc!==null&&sc!==undefined&&sc!==''&&item.max>0?Math.round(sc/item.max*100)+'%':'—';
    h+='<tr><td style="text-align:center">'+item.no+'</td><td>'+item.topic+'</td>';
    h+='<td style="text-align:center">'+item.max+'</td>';
    h+='<td style="text-align:center">'+(sc!==null&&sc!==undefined&&sc!==''?sc:'—')+'</td>';
    h+='<td style="text-align:center">'+pct+'</td></tr>';
  });

  h+='<tr class="pt-total"><td colspan="2">รวมคะแนน</td><td style="text-align:center">100</td>';
  h+='<td style="text-align:center">'+total+'</td>';
  h+='<td style="text-align:center">'+(totals[stName]?Math.round(totals[stName])+'%':'—')+'</td></tr>';
  h+='</tbody></table>';
  h+='<div style="margin-top:12px;font-size:11px;color:#6b7c8d;text-align:right">พิมพ์เมื่อ: '+new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'})+'</div>';

  document.getElementById('printContent').innerHTML=h;
  document.getElementById('printOverlay').style.display='block';
  setTimeout(function(){window.print();},300);
}

function closePrint(){
  document.getElementById('printOverlay').style.display='none';
}

// Load data
google.script.run
  .withSuccessHandler(renderAll)
  .withFailureHandler(function(e){
    ['lm','s','xs'].forEach(function(k){
      var c=document.getElementById('tab-'+k).querySelector('.container');
      c.innerHTML='<div class="loading">&#10060; '+e.message+'</div>';
    });
  })
  .getReportData();
</script>
</body>
</html>
