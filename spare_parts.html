document.getElementById('s7total').textContent=t7;
document.getElementById('s14total').textContent=t14;
document.getElementById('ss7total').textContent=ts7;

function setMode(m){
  MODE=m;
  document.querySelectorAll('.tab-g-btn').forEach(function(b,i){b.classList.toggle('active',['ref','count'][i]===m);});
  document.getElementById('checkHeader').style.display=m==='count'?'':'none';
  document.getElementById('check50Header').style.display=m==='count'?'':'none';
  document.getElementById('countResult').style.display=m==='count'?'':'none';
  document.getElementById('tableTitle').textContent=m==='ref'?'รายการพัสดุสำรองคลัง — ยอดอนุมัติ':'นับพัสดุ — เช็คครบ/ปริมาณ ≥ 50%';
  renderTable();
  if(m==='count') updateCount();
}

function setTypeFilter(){
  var t=document.getElementById('typeFilter').value;
  QTY_FIELD=t==='7d'?'qty7':t==='14d'?'qty14':'qtyS7';
  var lbl=t==='7d'?'ยอดสำรอง (7 วัน)':t==='14d'?'ยอดสำรอง (14 วัน)':'ยอดสำรองมรสุม (7 วัน)';
  document.getElementById('qtyHeader').textContent=lbl;
  renderTable();
}

function renderTable(){
  var q=document.getElementById('sq').value.toLowerCase();
  var rows=SPARE_PARTS.filter(function(p){return !q||(p.name.toLowerCase().includes(q)||p.code.includes(q));});
  document.getElementById('tbody').innerHTML=rows.map(function(p){
    var qty=p[QTY_FIELD];
    var checkCell=MODE==='count'?'<td style="text-align:center"><input type="checkbox" '+(checks[p.no]?'checked':'')+' onchange="toggleCheck('+p.no+',this.checked,false)" style="accent-color:#1a3c5e;width:16px;height:16px;"></td>':'';
    var check50Cell=MODE==='count'?'<td style="text-align:center"><input type="checkbox" '+(checks50[p.no]?'checked':'')+' onchange="toggleCheck('+p.no+',this.checked,true)" style="accent-color:#e84c0a;width:16px;height:16px;"></td>':'';
    return '<tr id="tr-'+p.no+'">'
      +'<td class="no">'+p.no+'</td>'
      +'<td class="code">'+p.code+'</td>'
      +'<td>'+p.name+'</td>'
      +'<td style="color:#6b7c8d">'+p.unit+'</td>'
      +'<td class="r">'+qty+'</td>'
      +checkCell+check50Cell
      +'</tr>';
  }).join('');
}

function toggleCheck(no,val,is50){
  if(is50) checks50[no]=val; else checks[no]=val;
  updateCount();
}

function updateCount(){
  var c=Object.keys(checks).filter(function(k){return checks[k];}).length;
  var c50=Object.keys(checks50).filter(function(k){return checks50[k];}).length;
  var pct18=Math.round(c/73*100);
  var pct19=Math.round(c50/73*100);
  var el=document.getElementById('countResult');
  el.textContent='รายการ: '+c+'/73 ('+pct18+'%) | ปริมาณ≥50%: '+c50+'/73 ('+pct19+'%)';
}

function ft(){ renderTable(); }

renderTable();
</script>
</body>
